<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PolitiBattle Arena — 3D Combat</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --rep:#ef4444;--dem:#3b82f6;--soc:#ec4899;--auth:#7c3aed;
  --grn:#22c55e;--lib:#eab308;--cen:#94a3b8;--pop:#f97316;
  --corp:#475569;--rev:#dc2626;--gold:#f59e0b;
  --bg:#050810;--card:rgba(255,255,255,.035);--bdr:rgba(255,255,255,.08);--muted:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#e2e8f0;font-family:'Chakra Petch',sans-serif}
canvas#c3d{position:fixed;inset:0;z-index:0;display:block}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column}
#hud>*{pointer-events:auto}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(5,8,16,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--bdr)}
.bk{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:9px;background:var(--card);border:1px solid var(--bdr);color:var(--muted);font-size:.72rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:'Chakra Petch',sans-serif;transition:.2s}
.bk:hover{color:#fff;background:rgba(255,255,255,.08)}
.wbdg{margin:0 auto;padding:3px 12px;border-radius:16px;font-size:.62rem;font-weight:700;font-family:'Orbitron',sans-serif;display:none;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.5);backdrop-filter:blur(6px)}
.tnc{font-family:'Orbitron',sans-serif;font-size:.68rem;color:var(--gold);background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);padding:3px 12px;border-radius:9px}
.hprow{display:flex;gap:10px;padding:6px 14px;justify-content:space-between}
.hpp{flex:1;max-width:360px;background:rgba(5,8,16,.92);backdrop-filter:blur(18px);border:1px solid var(--bdr);border-radius:14px;padding:9px 13px;position:relative;overflow:hidden}
.hpp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.hpp.pl::before{background:linear-gradient(90deg,var(--dem),var(--grn))}
.hpp.en::before{background:linear-gradient(90deg,var(--rep),var(--auth))}
.hpn{font-family:'Russo One',sans-serif;font-size:.88rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpsub{font-size:.56rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hptyps{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.tp{padding:1px 6px;border-radius:6px;font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.tp-Republican{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.tp-Democrat{background:rgba(59,130,246,.18);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.tp-Socialist{background:rgba(236,72,153,.18);color:#f9a8d4;border:1px solid rgba(236,72,153,.3)}
.tp-Authoritarian{background:rgba(124,58,237,.18);color:#c4b5fd;border:1px solid rgba(124,58,237,.3)}
.tp-Green{background:rgba(34,197,94,.18);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.tp-Libertarian{background:rgba(234,179,8,.18);color:#fde047;border:1px solid rgba(234,179,8,.3)}
.tp-Centrist{background:rgba(148,163,184,.18);color:#cbd5e1;border:1px solid rgba(148,163,184,.3)}
.tp-Populist{background:rgba(249,115,22,.18);color:#fdba74;border:1px solid rgba(249,115,22,.3)}
.tp-Corporate{background:rgba(71,85,105,.22);color:#94a3b8;border:1px solid rgba(71,85,105,.4)}
.tp-Revolutionary{background:rgba(220,38,38,.18);color:#fda4af;border:1px solid rgba(220,38,38,.35)}
.hptrk{height:8px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:5px}
.hpf{height:100%;border-radius:5px;transition:width .55s cubic-bezier(.4,0,.2,1),background .4s;background:linear-gradient(90deg,#22c55e,#4ade80);position:relative}
.hpf.y{background:linear-gradient(90deg,#eab308,#fde047)}.hpf.r{background:linear-gradient(90deg,#ef4444,#f87171)}
.hpf::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.28),transparent);border-radius:5px 5px 0 0}
.hptxt{display:flex;justify-content:space-between;font-size:.56rem;color:var(--muted);margin-top:2px}
.schps{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.sch{padding:1px 5px;border-radius:5px;font-size:.5rem;font-weight:700;text-transform:uppercase}
.sch.burn{background:rgba(239,68,68,.25);color:#fca5a5}.sch.paralysis{background:rgba(234,179,8,.25);color:#fde047}
.sch.sleep{background:rgba(148,163,184,.25);color:#cbd5e1}.sch.poison,.sch.toxic{background:rgba(168,85,247,.25);color:#d8b4fe}
.sch.freeze{background:rgba(147,197,253,.3);color:#bfdbfe}.sch.confused{background:rgba(249,115,22,.25);color:#fdba74}
.spacer{flex:1;pointer-events:none}
.bpanel{background:rgba(5,8,16,.95);backdrop-filter:blur(18px);border-top:1px solid var(--bdr);padding:8px 12px;display:flex;flex-direction:column;gap:6px;max-height:46vh;overflow-y:auto}
.blog{background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:9px;padding:6px 9px;max-height:72px;overflow-y:auto;font-family:'Press Start 2P',monospace;font-size:.48rem;line-height:2.1;color:#94a3b8;scroll-behavior:smooth}
.blog p{margin-bottom:0;animation:lin .12s ease-out}
@keyframes lin{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.li{color:#fff}.le{color:var(--gold)}.ld{color:#f87171}.lh{color:#4ade80}.ls{color:#c4b5fd}.lc{color:#fbbf24;font-weight:700}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mb{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:7px 9px;cursor:pointer;transition:.2s;text-align:left;position:relative;overflow:hidden}
.mb:hover:not(:disabled){transform:translateY(-2px);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.06)}
.mb:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.mbt{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.mbn{font-weight:700;font-size:.68rem;color:#fff;font-family:'Russo One',sans-serif}
.mbpp{font-size:.54rem;color:var(--muted)}
.mbm{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.mc{font-size:.46rem;padding:1px 4px;border-radius:5px;font-weight:700;text-transform:uppercase}
.mc.physical{background:rgba(249,115,22,.2);color:#fdba74;border:1px solid rgba(249,115,22,.3)}
.mc.special{background:rgba(99,102,241,.2);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.mc.status{background:rgba(148,163,184,.2);color:#cbd5e1;border:1px solid rgba(148,163,184,.3)}
.mpw{font-size:.46rem;color:var(--muted)}
.ppb{height:3px;border-radius:2px;background:rgba(255,255,255,.07);margin-top:3px;overflow:hidden}
.ppf{height:100%;border-radius:2px;transition:width .3s}
.swp{display:none;grid-template-columns:repeat(3,1fr);gap:5px}
.swp.on{display:grid}
.swb{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:5px;cursor:pointer;transition:.2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.swb:hover:not(:disabled){border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.05)}
.swb:disabled{opacity:.3;cursor:not-allowed}
.swe{font-size:1.3rem}.swn{font-size:.56rem;font-weight:700;color:#fff}
.swhp{width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
.swhpf{height:100%;border-radius:2px;background:#22c55e}
.ctrls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cc{padding:5px 12px;border-radius:9px;border:1px solid var(--bdr);background:var(--card);color:var(--muted);font-size:.68rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Chakra Petch',sans-serif}
.cc:hover{background:rgba(255,255,255,.08);color:#fff}
.cc.sw{color:var(--gold);border-color:rgba(245,158,11,.3)}
.cc.sw:hover{background:rgba(245,158,11,.08)}
.dmgfl{position:fixed;font-family:'Orbitron',monospace;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.9);animation:dflt 1.15s ease-out forwards;pointer-events:none;z-index:50;color:#fff}
@keyframes dflt{0%{opacity:1;transform:translateY(0) scale(1)}28%{transform:translateY(-28px) scale(1.3)}100%{opacity:0;transform:translateY(-80px) scale(.55)}}
.dmgfl.cr{color:#fbbf24;font-size:1.6rem}.dmgfl.hl{color:#4ade80}.dmgfl.ms{color:#94a3b8;font-size:.8rem}.dmgfl.sp{color:#ff6b6b}.dmgfl.rs{color:#64748b}
.critb{position:fixed;top:34%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;font-size:.8rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px #fbbf24);animation:cpop .95s ease-out forwards;z-index:60;pointer-events:none;white-space:nowrap}
@keyframes cpop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}22%{opacity:1;transform:translate(-50%,-55%) scale(1.4)}55%{opacity:1}100%{opacity:0;transform:translate(-50%,-72%) scale(.7)}}
.koex{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;font-size:2.2rem;color:#ef4444;text-shadow:0 0 35px #ef4444,0 0 70px #ef4444;animation:kox 1.2s ease-out forwards;z-index:60;pointer-events:none}
@keyframes kox{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-8deg)}25%{opacity:1;transform:translate(-50%,-55%) scale(1.45) rotate(4deg)}55%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}
.vov{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(14px)}
.vov.on{display:flex}
.vbox{text-align:center;animation:vin .55s ease-out}
@keyframes vin{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
.vi{font-size:5rem;margin-bottom:14px}
.vt{font-family:'Russo One',sans-serif;font-size:2.4rem;margin-bottom:6px}
.vs{font-size:.82rem;color:#94a3b8;margin-bottom:22px}
.vb{padding:12px 30px;border-radius:14px;border:none;cursor:pointer;font-family:'Russo One',sans-serif;font-size:.95rem;color:#fff;background:linear-gradient(135deg,var(--rep),var(--dem));box-shadow:0 8px 30px rgba(220,38,38,.3);transition:.25s}
.vb:hover{transform:translateY(-3px);box-shadow:0 14px 45px rgba(220,38,38,.5)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="hud">
  <div class="topbar">
    <a href="/politibattle" class="bk">◀ PolitiBattle</a>
    <div class="wbdg" id="wbdg"></div>
    <div class="tnc" id="tnc">Turn 1</div>
  </div>
  <div class="hprow">
    <div class="hpp pl"><div class="hpn" id="pn">—</div><div class="hpsub" id="ps">Lv.50</div><div class="hptyps" id="pt"></div><div class="hptrk"><div class="hpf" id="phf" style="width:100%"></div></div><div class="hptxt"><span id="pht">—</span><span id="php">100%</span></div><div class="schps" id="psc"></div></div>
    <div class="hpp en"><div class="hpn" id="en">—</div><div class="hpsub" id="es">Lv.50</div><div class="hptyps" id="et"></div><div class="hptrk"><div class="hpf" id="ehf" style="width:100%"></div></div><div class="hptxt"><span id="eht">—</span><span id="ehp">100%</span></div><div class="schps" id="esc"></div></div>
  </div>
  <div class="spacer"></div>
  <div class="bpanel">
    <div class="blog" id="blog"></div>
    <div class="mgrid" id="mgrid"></div>
    <div class="swp" id="swp"></div>
    <div class="ctrls"><button class="cc sw" onclick="togSw()">🔄 Switch</button></div>
  </div>
</div>
<div class="vov" id="vov"><div class="vbox"><div class="vi" id="vi">🏆</div><div class="vt" id="vt">VICTORY!</div><div class="vs" id="vs2">Your team crushed the opposition!</div><button class="vb" onclick="location.href='/politibattle'">Return to Lobby</button></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══ TYPE CHART (exact match) ═══
const TC={Republican:{Republican:1,Democrat:1.5,Libertarian:.5,Green:1.5,Socialist:2,Authoritarian:.5,Centrist:1,Populist:1,Corporate:.5,Revolutionary:2},Democrat:{Republican:1.5,Democrat:1,Libertarian:.5,Green:1,Socialist:.5,Authoritarian:.5,Centrist:1,Populist:.5,Corporate:2,Revolutionary:1},Libertarian:{Republican:.5,Democrat:1,Libertarian:1,Green:.5,Socialist:1.5,Authoritarian:2,Centrist:1,Populist:1,Corporate:.5,Revolutionary:1.5},Green:{Republican:1,Democrat:.5,Libertarian:1,Green:1,Socialist:.5,Authoritarian:1,Centrist:1.5,Populist:1,Corporate:2,Revolutionary:1},Socialist:{Republican:2,Democrat:.5,Libertarian:1,Green:1,Socialist:1,Authoritarian:.5,Centrist:1,Populist:1.5,Corporate:2,Revolutionary:.5},Authoritarian:{Republican:1,Democrat:1.5,Libertarian:.5,Green:.5,Socialist:.5,Authoritarian:1,Centrist:1,Populist:1.5,Corporate:1,Revolutionary:.5},Centrist:{Republican:1,Democrat:1,Libertarian:1,Green:1,Socialist:1,Authoritarian:1,Centrist:1,Populist:1,Corporate:1,Revolutionary:1},Populist:{Republican:.5,Democrat:1.5,Libertarian:1,Green:1,Socialist:1,Authoritarian:.5,Centrist:2,Populist:1,Corporate:1.5,Revolutionary:1},Corporate:{Republican:.5,Democrat:.5,Libertarian:1,Green:.5,Socialist:.5,Authoritarian:1,Centrist:1,Populist:.5,Corporate:1,Revolutionary:1},Revolutionary:{Republican:1.5,Democrat:1,Libertarian:1,Green:1,Socialist:1,Authoritarian:1.5,Centrist:.5,Populist:.5,Corporate:1.5,Revolutionary:1}};
TC.Authoritarian.Libertarian=0;TC.Corporate.Revolutionary=0;
const TPCSS={Republican:'#ef4444',Democrat:'#3b82f6',Socialist:'#ec4899',Authoritarian:'#7c3aed',Green:'#22c55e',Libertarian:'#eab308',Centrist:'#94a3b8',Populist:'#f97316',Corporate:'#475569',Revolutionary:'#dc2626'};

let BAT=null,scene,cam,renderer,clock,skyMat,pSp,eSp,hexP;
let pBob=0,eBob=Math.PI,camG={x:0,y:3.8,z:13},camL={x:0,y:1.2,z:0},camS=.03,shk=0,introT=0;

function init3D(){
  const c=document.getElementById('c3d');
  renderer=new THREE.WebGLRenderer({canvas:c,antialias:true});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x070b18,.015);
  cam=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.1,250);cam.position.set(0,2.2,3.5);
  clock=new THREE.Clock();
  // Sky
  const sG=new THREE.SphereGeometry(90,32,32);
  skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{uT:{value:0}},
    vertexShader:'varying vec3 vP;void main(){vP=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
    fragmentShader:'uniform float uT;varying vec3 vP;void main(){float y=normalize(vP).y;vec3 lo=vec3(.015,.02,.06);vec3 mid=vec3(.04,.03,.12);vec3 hi=vec3(.008,.008,.03);vec3 c=mix(lo,mid,smoothstep(-.1,.3,y));c=mix(c,hi,smoothstep(.3,.9,y));float a=sin(vP.x*.25+uT*.18)*cos(vP.z*.18+uT*.12);a=smoothstep(.3,.8,a)*smoothstep(.15,.5,y)*(1.-smoothstep(.5,.8,y));c+=vec3(.06,.15,.4)*a*.2;c+=vec3(.4,.1,.15)*smoothstep(-.3,-.05,y)*.08;gl_FragColor=vec4(c,1.);}'});
  scene.add(new THREE.Mesh(sG,skyMat));
  // Stars
  const sN=400,stG=new THREE.BufferGeometry(),stP=new Float32Array(sN*3);
  for(let i=0;i<sN;i++){const t=Math.random()*Math.PI*2,p=Math.acos(Math.random()*.85+.15),r=75;stP[i*3]=r*Math.sin(p)*Math.cos(t);stP[i*3+1]=r*Math.cos(p);stP[i*3+2]=r*Math.sin(p)*Math.sin(t);}
  stG.setAttribute('position',new THREE.BufferAttribute(stP,3));
  scene.add(new THREE.Points(stG,new THREE.PointsMaterial({color:0xffffff,size:.12,transparent:true,opacity:.75})));
  // Hex platform
  const hS=new THREE.Shape(),hR=6.5;
  for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6,x=hR*Math.cos(a),z=hR*Math.sin(a);i===0?hS.moveTo(x,z):hS.lineTo(x,z);}hS.closePath();
  const hG=new THREE.ExtrudeGeometry(hS,{depth:.7,bevelEnabled:true,bevelThickness:.1,bevelSize:.1,bevelSegments:4});hG.rotateX(-Math.PI/2);
  hexP=new THREE.Mesh(hG,new THREE.MeshStandardMaterial({color:0x080e1e,metalness:.85,roughness:.18,emissive:0x0a1535,emissiveIntensity:.35}));
  hexP.position.y=-.35;hexP.receiveShadow=true;scene.add(hexP);
  // Rings
  [[hR*.94,0x3b82f6,.55],[hR*.55,0xef4444,.3],[hR*.3,0x7c3aed,.2]].forEach(([r,co,op])=>{const rG=new THREE.TorusGeometry(r,.03,8,6);rG.rotateX(Math.PI/2);scene.add(new THREE.Mesh(rG,new THREE.MeshBasicMaterial({color:co,transparent:true,opacity:op})).translateY(.02));});
  // Grid
  const gM=new THREE.LineBasicMaterial({color:0x1a3058,transparent:true,opacity:.12});
  for(let i=-5;i<=5;i++){scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i,.025,-6),new THREE.Vector3(i,.025,6)]),gM));scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-6,.025,i),new THREE.Vector3(6,.025,i)]),gM));}
  // Capitol
  const cG=new THREE.Group();cG.position.set(0,-2.5,-45);
  const bM=new THREE.MeshBasicMaterial({color:0x0c1828,transparent:true,opacity:.45});
  cG.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(22,5,2.5),bM),{position:new THREE.Vector3(0,2.5,0)}));
  cG.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(3.2,20,14,0,Math.PI*2,0,Math.PI/2),new THREE.MeshBasicMaterial({color:0x0f1f38,transparent:true,opacity:.45})),{position:new THREE.Vector3(0,5,0)}));
  cG.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.08,.28,4.5,8),new THREE.MeshBasicMaterial({color:0x152a48,transparent:true,opacity:.4})),{position:new THREE.Vector3(0,9.5,0)}));
  [-13,13].forEach(x=>cG.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(9,4.2,2.2),bM),{position:new THREE.Vector3(x,2.1,0)})));
  for(let i=-7;i<=7;i+=1.8)cG.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.18,.18,5.2,8),new THREE.MeshBasicMaterial({color:0x132038,transparent:true,opacity:.3})),{position:new THREE.Vector3(i,2.6,1.4)}));
  scene.add(cG);
  // Sprites
  pSp=mkSp('👤');pSp.position.set(-3.2,1.6,0);scene.add(pSp);
  eSp=mkSp('👤');eSp.position.set(3.2,1.6,0);scene.add(eSp);
  // Lights
  scene.add(new THREE.AmbientLight(0x18244a,.45));
  const kL=new THREE.DirectionalLight(0xffeedd,1.25);kL.position.set(5,14,9);kL.castShadow=true;kL.shadow.mapSize.set(1024,1024);kL.shadow.camera.near=1;kL.shadow.camera.far=35;kL.shadow.camera.left=-12;kL.shadow.camera.right=12;kL.shadow.camera.top=12;kL.shadow.camera.bottom=-12;scene.add(kL);
  const fL=new THREE.DirectionalLight(0x4488ff,.5);fL.position.set(-6,9,-5);scene.add(fL);
  scene.add(Object.assign(new THREE.PointLight(0xef4444,1.8,22),{position:new THREE.Vector3(-7,4.5,-2)}));
  scene.add(Object.assign(new THREE.PointLight(0x3b82f6,1.8,22),{position:new THREE.Vector3(7,4.5,-2)}));
  scene.add(Object.assign(new THREE.PointLight(0x3b82f6,.7,12),{position:new THREE.Vector3(0,-1.2,0)}));
  [[-5,12,7],[5,12,7],[0,14,-5]].forEach(([x,y,z])=>{const sp=new THREE.SpotLight(0xffffff,.7,35,Math.PI/6,.5,1);sp.position.set(x,y,z);sp.target.position.set(0,0,0);scene.add(sp);scene.add(sp.target);});
  // Dust

}
function mkSp(em){const cv=document.createElement('canvas');cv.width=256;cv.height=256;const cx=cv.getContext('2d');const g=cx.createRadialGradient(128,128,35,128,128,120);g.addColorStop(0,'rgba(255,255,255,.07)');g.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=g;cx.fillRect(0,0,256,256);cx.font='130px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(em,128,128);const t=new THREE.CanvasTexture(cv);t.needsUpdate=true;const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false}));s.scale.set(3.2,3.2,1);s._em=em;s._cv=cv;s._cx=cx;return s;}

function camTo(x,y,z,lx,ly,lz,s=.04){camG={x,y,z};camL={x:lx,y:ly,z:lz};camS=s;}

function animate(){

  if(iP<1){cam.position.x=iE*camG.x;cam.position.y=2.2+iE*(camG.y-2.2);cam.position.z=3.5+iE*(camG.z-3.5);}
  else{cam.position.x+=(camG.x-cam.position.x)*camS;cam.position.y+=(camG.y-cam.position.y)*camS;cam.position.z+=(camG.z-cam.position.z)*camS;}

// ═══ BATTLE ENGINE ═══
const dly=ms=>new Promise(r=>setTimeout(r,ms));
function cHP(b){return Math.floor(((2*b+31+Math.floor(85/4))*50/100)+50+10);}
function cSt(b){return Math.floor(((2*b+31+Math.floor(85/4))*50/100)+5);}
function typeEff(mt,dt){let m=1;for(const d of dt){const r=TC[mt];if(r&&r[d]!==undefined)m*=r[d];}return m;}
function effSt(f,s){const b=f.bs[s],st=Math.max(-6,Math.min(6,f.stg[s])),m=st>=0?(2+st)/2:2/(2+Math.abs(st));let v=Math.max(1,Math.floor(b*m));if(s==='spe'&&f.status==='paralysis')v=Math.floor(v*.5);return v;}
function buildF(pol,isP){const s=pol.bs||{};const bs={atk:cSt(s.atk||60),def:cSt(s.def||60),spa:cSt(s.spa||60),spd:cSt(s.spd||60),spe:cSt(s.spe||60)};const mhp=cHP(s.hp||60);
return{id:pol.id||'',n:pol.n||pol.name||'???',e:pol.e||pol.emoji||'👤',ttl:pol.ttl||pol.title||'',tps:[...(pol.tps||pol.types||['Centrist'])],abl:pol.abl||pol.ability||'',abld:pol.abld||'',itm:pol.itm||pol.item||null,isP,mhp,hp:mhp,status:null,txCnt:0,slpT:0,confused:false,confuseTurns:0,stg:{atk:0,def:0,spa:0,spd:0,spe:0},mvs:(pol.mvs||pol.moves||[]).map(m=>({n:m.n||m.name,tp:m.tp||m.type,c:m.c||m.category,pw:m.pw||m.power||0,ac:m.ac||m.accuracy||100,pp:m.pp||10,cpp:m.cpp!==undefined?m.cpp:m.pp||10,d:m.d||m.description||'',ef:m.ef||m.effect||null,pri:m.pri||0})),bs,fainted:false,flinched:false,_silenced:false,_endu:0,_rl:false,_ns:false,_firstMoved:false,lockedMove:null};}

function calcDmg(a,d,mv,w){if(mv.pw<=0)return{dmg:0,isCrit:false,eff:1};let as=mv.c==='physical'?effSt(a,'atk'):effSt(a,'spa'),ds=mv.c==='physical'?effSt(d,'def'):effSt(d,'spd');if(a.status==='burn'&&mv.c==='physical')as=Math.floor(as*.5);const stab=a.tps.includes(mv.tp)?1.5:1,eff=typeEff(mv.tp,d.tps);if(eff===0)return{dmg:0,isCrit:false,eff:0};const isCrit=Math.random()<.0417,cm=isCrit?1.5:1;let wm=1;if(w==='sunny'){if(mv.tp==='Green')wm=1.5;else if(mv.tp==='Democrat'&&mv.c==='special')wm=.5;}if(w==='rain'){if(mv.tp==='Democrat'&&mv.c==='special')wm=1.5;else if(mv.tp==='Republican')wm=.5;}let dm=Math.floor((((100/5+2)*mv.pw*as/ds)/50+2)*stab*eff*cm*wm);return{dmg:Math.max(1,Math.floor(dm*(.85+Math.random()*.15))),isCrit,eff};}
function rawDmg(f,a){if(a>=f.hp&&f.hp>0){if(f.abl==='Long Walk Endure'&&f._endu<2){f._endu++;f.hp=1;blog('<span class="ls">🛡️ '+f.n+' endures!</span>');return 0;}if(f.abl==='Revolution Lives'&&!f._rl){f._rl=true;f.hp=1;blog('<span class="ls">🛡️ '+f.n+' endures!</span>');return 0;}}const r=Math.min(f.hp,a);f.hp=Math.max(0,f.hp-a);if(f.hp<=0){f.hp=0;f.fainted=true;}return r;}
function healF(f,a){f.hp=Math.min(f.mhp,f.hp+a);}
function stUp(f,s,v){const o=f.stg[s];f.stg[s]=Math.max(-6,Math.min(6,f.stg[s]+v));const d=f.stg[s]-o;if(!d)return;const nm={atk:'Atk',def:'Def',spa:'SpA',spd:'SpD',spe:'Spe'};blog(`<span class="ls">${d>0?'⬆️':'⬇️'} ${f.n}'s ${nm[s]} ${d>0?(d>1?'sharply rose':'rose'):(d<-1?'harshly fell':'fell')}!</span>`);}
function statusChk(f){if(f.flinched){f.flinched=false;blog('<span class="ls">😰 '+f.n+' flinched!</span>');return false;}if(f.confused){f.confuseTurns--;if(f.confuseTurns<=0){f.confused=false;blog('<span class="lh">'+f.n+' snapped out of confusion!</span>');}else if(Math.random()<.33){const d=Math.floor(f.mhp/12);rawDmg(f,d);blog('<span class="ld">😵 '+f.n+' hurt itself! ('+d+')</span>');updHUD();return false;}}if(!f.status)return true;if(f.status==='sleep'){f.slpT--;if(f.slpT<=0){f.status=null;blog('<span class="lh">💤 '+f.n+' woke up!</span>');return true;}blog('<span class="ls">💤 '+f.n+' is asleep!</span>');return false;}if(f.status==='paralysis'&&Math.random()<.25){blog('<span class="ls">⚡ '+f.n+' is paralyzed!</span>');return false;}if(f.status==='freeze'){if(Math.random()<.2){f.status=null;blog('<span class="lh">❄️ '+f.n+' thawed!</span>');return true;}blog('<span class="ls">❄️ '+f.n+' is frozen!</span>');return false;}return true;}

function blog(m){const l=document.getElementById('blog'),p=document.createElement('p');p.innerHTML=m;l.appendChild(p);l.scrollTop=l.scrollHeight;}
function spDmg(t,c,l){const e=document.createElement('div');e.className='dmgfl '+c;e.textContent=t;e.style.fontSize=c==='cr'?'1.5rem':'1.15rem';e.style.left=l?'22%':'72%';e.style.top='33%';document.body.appendChild(e);setTimeout(()=>e.remove(),1250);}
function spCrit(){const e=document.createElement('div');e.className='critb';e.textContent='★ CRITICAL HIT! ★';document.body.appendChild(e);setTimeout(()=>e.remove(),1050);}
function spKO(){const e=document.createElement('div');e.className='koex';e.textContent='K.O.!';document.body.appendChild(e);setTimeout(()=>e.remove(),1350);}

async function applyEf(a,d,m,isP){const e=m.ef;if(!e)return;
if(e.heal&&e.self){const am=Math.floor(a.mhp*e.heal);healF(a,am);blog('<span class="lh">💊 '+a.n+' restored '+am+' HP!</span>');spDmg('+'+am,'hl',isP);}
if(e.up&&e.self)Object.entries(e.up).forEach(([s,v])=>stUp(a,s,v));
if(e.dn&&e.tgt)Object.entries(e.dn).forEach(([s,v])=>stUp(d,s,-v));
if(e.dn&&e.self&&!e.tgt)Object.entries(e.dn).forEach(([s,v])=>stUp(a,s,-v));
if(e.statBoost){if(e.self)Object.entries(e.statBoost).forEach(([s,v])=>stUp(a,s,v));else{const ch=e.chance||100;if(Math.random()*100<ch)Object.entries(e.statBoost).forEach(([s,v])=>stUp(d,s,v));}}
if(e.chance&&e.dn&&!e.self&&!e.tgt&&Math.random()*100<e.chance)Object.entries(e.dn).forEach(([s,v])=>stUp(d,s,-v));
const ch=e.chance||100;
if(e.status&&!d.status&&Math.random()*100<ch){d.status=e.status;if(e.status==='sleep')d.slpT=1+Math.floor(Math.random()*3);if(e.status==='toxic')d.txCnt=0;blog('<span class="ls">🔴 '+d.n+' is now '+d.status.toUpperCase()+'!</span>');}
if(e.confuse&&!d.confused&&Math.random()*100<(typeof e.confuse==='number'?e.confuse:100)){d.confused=true;d.confuseTurns=2+Math.floor(Math.random()*4);blog('<span class="ls">😵 '+d.n+' became confused!</span>');}
if(e.hz){const arr=isP?BAT.aHz:BAT.pHz;if(!arr.includes(e.hz)){arr.push(e.hz);blog('<span class="ls">🗺️ '+(e.hz==='stealthRock'?'Scandal Stones':'Spikes')+' set!</span>');}}
if(e.weather){BAT.weather=e.weather;BAT.wT=5;const wn={sunny:'☀️ Sun!',rain:'🌧️ Rain!',sandstorm:'🌪️ Sandstorm!',hail:'❄️ Hail!'};blog('<span class="ls">'+wn[e.weather]+'</span>');updW();}
if(e.clearHz){(isP?BAT.pHz:BAT.aHz).length=0;blog('<span class="ls">🧹 Hazards cleared!</span>');}
if(e.cureStatus&&e.self){a.status=null;a.confused=false;blog('<span class="lh">✨ '+a.n+' cured!</span>');}
if(e.selfConfuse){a.confused=true;a.confuseTurns=3;}
if(e.costHp&&e.self){rawDmg(a,Math.floor(a.mhp*e.costHp));}
if(e.silence&&e.tgt)d._silenced=true;
updHUD();}

function hazDmg(f,hz){hz.forEach(h=>{if(h==='stealthRock'){const d=Math.floor(f.mhp/8);rawDmg(f,d);blog('<span class="ld">⛰️ Stones hit '+f.n+'! ('+d+')</span>');}if(h==='spikes'){const d=Math.floor(f.mhp/10);rawDmg(f,d);blog('<span class="ld">🗡️ Spikes hit '+f.n+'! ('+d+')</span>');}if(h==='stickyWeb')stUp(f,'spe',-1);});}

async function animLunge(sp,isP){const ox=sp.position.x,tx=isP?ox+2.2:ox-2.2,st=performance.now();await new Promise(res=>{(function s(n){const p=Math.min((n-st)/220,1);sp.position.x=ox+(tx-ox)*Math.sin(p*Math.PI);sp.scale.set(3.2+Math.sin(p*Math.PI)*.35,3.2+Math.sin(p*Math.PI)*.35,1);p<1?requestAnimationFrame(s):(sp.position.x=ox,sp.scale.set(3.2,3.2,1),res());})(performance.now());});}
async function animHit(sp){sp.scale.set(2.8,3.6,1);await dly(80);sp.scale.set(3.2,3.2,1);const ox=sp.position.x;sp.position.x=ox+.15;await dly(30);sp.position.x=ox-.15;await dly(30);sp.position.x=ox;}

async function execMove(atk,def,idx,isP){
  if(atk._silenced){const m=atk.mvs[idx];if(m&&m.c!=='status'){const si=atk.mvs.findIndex(m2=>m2.cpp>0&&m2.c==='status');if(si>=0)idx=si;else{blog('<span class="ls">🤐 '+atk.n+' silenced!</span>');atk._silenced=false;return;}}atk._silenced=false;}
  if(atk.lockedMove!==null&&atk.mvs[atk.lockedMove]?.cpp>0)idx=atk.lockedMove;
  const m=atk.mvs[idx];if(!m)return;m.cpp=Math.max(0,m.cpp-1);
  blog('<span class="li">⚡ '+atk.n+' used <strong>'+m.n+'</strong>!</span>');
  camAtk(isP);await dly(350);
  if(Math.random()*100>m.ac){blog('<span class="ls">😮 Missed!</span>');spDmg('Miss!','ms',!isP);await dly(400);camDef();return;}
  await animLunge(isP?pSp:eSp,isP);
  if(m.c==='status'){await dly(200);await applyEf(atk,def,m,isP);await dly(250);camDef();return;}
  const{dmg,isCrit,eff}=calcDmg(atk,def,m,BAT.weather);
  if(eff===0){blog('<span class="ls">🛡️ No effect!</span>');await dly(400);camDef();return;}
  if(dmg>def.mhp*.22||isCrit){camZoom(!isP);await dly(180);}
  const rd=rawDmg(def,dmg);blog('<span class="ld">💥 '+rd+' dmg ('+Math.round(rd/def.mhp*100)+'%)</span>');
  spDmg(dmg,isCrit?'cr':eff>1?'sp':eff<1?'rs':'',!isP);await animHit(isP?eSp:pSp);
  if(isCrit){spCrit();shk=.45;blog('<span class="lc">★ Critical hit!</span>');}
  if(eff>1)blog('<span class="le">🔥 Super effective! ('+eff+'x)</span>');else if(eff<1&&eff>0)blog('<span class="ls">🛡️ Not very effective...</span>');
  if(m.ef?.flinch&&Math.random()*100<(m.ef.chance||100))def.flinched=true;
  if(m.ef?.recoil){const rc=Math.floor(rd*m.ef.recoil);rawDmg(atk,rc);blog('<span class="ld">💢 '+atk.n+' recoil! ('+rc+')</span>');}
  atk._firstMoved=true;updHUD();
  if(def.fainted){shk=.65;spKO();blog('<span class="ld">💀 '+def.n+' KO\'d!</span>');await dly(900);await handleKO(def,isP);camDef();return;}
  await applyEf(atk,def,m,isP);updHUD();await dly(200);camDef();}

async function handleKO(f,isP){const b=BAT;
  if(isP){const nx=b.aTeam.findIndex((t,i)=>i!==b.aIdx&&!t.fainted);if(nx>=0){b.aIdx=nx;blog('<span class="li">'+b.aTeam[nx].n+' enters!</span>');updSp(eSp,b.aTeam[nx].e);hazDmg(b.aTeam[nx],b.aHz);}else{endB(true);return;}}
  else{const nx=b.pTeam.findIndex((t,i)=>i!==b.pIdx&&!t.fainted);if(nx>=0){b.pIdx=nx;blog('<span class="li">Go, '+b.pTeam[nx].n+'!</span>');updSp(pSp,b.pTeam[nx].e);hazDmg(b.pTeam[nx],b.pHz);}else{endB(false);return;}}updHUD();}

function eotFx(f){if(!f||f.fainted)return;
  if(f.status==='burn'){const d=Math.floor(f.mhp/16);rawDmg(f,d);blog('<span class="ld">🔥 '+f.n+' burn! ('+d+')</span>');}
  if(f.status==='poison'){const d=Math.floor(f.mhp/8);rawDmg(f,d);blog('<span class="ld">☠️ '+f.n+' poison! ('+d+')</span>');}
  if(f.status==='toxic'){f.txCnt++;const d=Math.floor(f.mhp/16*f.txCnt);rawDmg(f,d);blog('<span class="ld">💀 '+f.n+' toxic! ('+d+')</span>');}
  if(f.abl==='New Deal HP')healF(f,Math.floor(f.mhp/8));
  if(f.abl==='Sorry Not Sorry')healF(f,Math.floor(f.mhp*.1));
  if(f.abl==='En Marche'&&f.stg.spe<3)stUp(f,'spe',1);
  if(f.abl==='Never Surrender'&&f.hp<f.mhp*.5&&!f._ns){f._ns=true;stUp(f,'atk',1);}}

async function aiTurn(){const b=BAT,ef=b.aTeam[b.aIdx],pf=b.pTeam[b.pIdx];if(ef.fainted)return;
  if(!statusChk(ef)){updHUD();return;}
  if(ef.hp<ef.mhp*.2&&Math.random()<.3){const nx=b.aTeam.findIndex((t,i)=>i!==b.aIdx&&!t.fainted&&t.hp>t.mhp*.4);if(nx>=0){blog('<span class="li">🔄 '+ef.n+' → '+b.aTeam[nx].n+'!</span>');b.aIdx=nx;updSp(eSp,b.aTeam[nx].e);hazDmg(b.aTeam[nx],b.aHz);updHUD();return;}}
  if(ef.mvs.every(m=>m.cpp<=0)){blog('<span class="ld">😤 '+ef.n+' Struggle!</span>');await animLunge(eSp,false);const sd=Math.floor(50*ef.bs.atk/pf.bs.def*.4+2);rawDmg(pf,sd);spDmg(sd,'',true);await animHit(pSp);rawDmg(ef,Math.floor(ef.mhp*.25));updHUD();if(pf.fainted){shk=.55;spKO();await dly(800);await handleKO(pf,false);}if(ef.fainted){shk=.55;spKO();await dly(800);await handleKO(ef,true);}return;}
  let best=-Infinity,bi=0;ef.mvs.forEach((mv,i)=>{if(mv.cpp<=0)return;let sc=0;if(mv.pw>0){const e=typeEff(mv.tp,pf.tps);if(e===0)return;sc=mv.pw*e;if(ef.tps.includes(mv.tp))sc*=1.5;sc*=mv.c==='physical'?(ef.bs.atk/Math.max(1,pf.bs.def)):(ef.bs.spa/Math.max(1,pf.bs.spd));}else{sc=25;if(mv.ef?.heal&&ef.hp<ef.mhp*.45)sc+=50;if(mv.ef?.status&&!pf.status)sc+=30;if(mv.ef?.up||mv.ef?.statBoost)sc+=35;if(mv.ef?.hz)sc+=30;}if(sc>best){best=sc;bi=i;}});
  await execMove(ef,pf,bi,false);}

async function playerMove(idx){if(!BAT||BAT.over||BAT.busy)return;BAT.busy=true;
  const b=BAT,pf=b.pTeam[b.pIdx],ef=b.aTeam[b.aIdx];
  if(!statusChk(pf)){updHUD();await dly(500);await aiTurn();endT();return;}
  const pS=effSt(pf,'spe')+(pf.mvs[idx]?.pri||0)*10000,eS=effSt(ef,'spe');
  if(pS>=eS){await execMove(pf,ef,idx,true);if(!BAT.over&&!ef.fainted){await dly(500);await aiTurn();}}
  else{await aiTurn();if(!BAT.over&&!pf.fainted){await dly(500);await execMove(pf,ef,idx,true);}}
  if(!BAT.over)endT();}

function endT(){if(BAT.over)return;BAT.turn++;
  if(BAT.weather){BAT.wT--;if(BAT.wT<=0){blog('<span class="ls">🌤️ Weather cleared!</span>');BAT.weather=null;updW();}}
  const pf=BAT.pTeam[BAT.pIdx],ef=BAT.aTeam[BAT.aIdx];eotFx(pf);eotFx(ef);
  if(pf.fainted){const nx=BAT.pTeam.findIndex((t,i)=>i!==BAT.pIdx&&!t.fainted);if(nx>=0){BAT.pIdx=nx;updSp(pSp,BAT.pTeam[nx].e);hazDmg(BAT.pTeam[nx],BAT.pHz);}else{endB(false);return;}}
  if(ef.fainted){const nx=BAT.aTeam.findIndex((t,i)=>i!==BAT.aIdx&&!t.fainted);if(nx>=0){BAT.aIdx=nx;updSp(eSp,BAT.aTeam[nx].e);hazDmg(BAT.aTeam[nx],BAT.aHz);}else{endB(true);return;}}
  updHUD();BAT.busy=false;}

function endB(won){BAT.over=true;BAT.busy=false;
  document.getElementById('vi').textContent=won?'🏆':'💀';document.getElementById('vt').textContent=won?'VICTORY!':'DEFEATED!';document.getElementById('vt').style.color=won?'#fbbf24':'#ef4444';document.getElementById('vs2').textContent=won?'Your team crushed the opposition!':'The opposition won this round.';setTimeout(()=>document.getElementById('vov').classList.add('on'),1200);}

function updW(){const w=document.getElementById('wbdg');if(!BAT||!BAT.weather){w.style.display='none';return;}const nm={sunny:'☀️ Sun',rain:'🌧️ Rain',sandstorm:'🌪️ Sand',hail:'❄️ Hail'};w.textContent=nm[BAT.weather]||BAT.weather;w.style.display='';w.style.background='rgba(0,0,0,.5)';}

let swO=false;function togSw(){swO=!swO;document.getElementById('swp').classList.toggle('on',swO);document.getElementById('mgrid').style.display=swO?'none':'';}
async function switchTo(i){if(!BAT||BAT.over||BAT.busy||i===BAT.pIdx||BAT.pTeam[i].fainted)return;BAT.busy=true;blog('<span class="li">🔄 '+BAT.pTeam[BAT.pIdx].n+' → '+BAT.pTeam[i].n+'!</span>');BAT.pIdx=i;updSp(pSp,BAT.pTeam[i].e);hazDmg(BAT.pTeam[i],BAT.pHz);swO=false;document.getElementById('swp').classList.remove('on');document.getElementById('mgrid').style.display='';updHUD();await dly(500);await aiTurn();if(!BAT.over)endT();}

function updHUD(){if(!BAT)return;const pf=BAT.pTeam[BAT.pIdx],ef=BAT.aTeam[BAT.aIdx];
  document.getElementById('pn').textContent=pf.n;document.getElementById('ps').textContent='Lv.50'+(pf.abl?' • '+pf.abl:'');
  document.getElementById('pt').innerHTML=pf.tps.map(t=>'<span class="tp tp-'+t+'">'+t+'</span>').join('');
  const pp=Math.max(0,(pf.hp/pf.mhp)*100);const pF=document.getElementById('phf');pF.style.width=pp+'%';pF.className='hpf'+(pp<25?' r':pp<50?' y':'');
  document.getElementById('pht').textContent=pf.hp+' / '+pf.mhp;document.getElementById('php').textContent=Math.round(pp)+'%';
  let pS='';if(pf.status)pS+='<span class="sch '+pf.status+'">'+pf.status+'</span>';if(pf.confused)pS+='<span class="sch confused">confused</span>';document.getElementById('psc').innerHTML=pS;
  document.getElementById('en').textContent=ef.n;document.getElementById('es').textContent='Lv.50'+(ef.abl?' • '+ef.abl:'');
  document.getElementById('et').innerHTML=ef.tps.map(t=>'<span class="tp tp-'+t+'">'+t+'</span>').join('');
  const ep=Math.max(0,(ef.hp/ef.mhp)*100);const eF=document.getElementById('ehf');eF.style.width=ep+'%';eF.className='hpf'+(ep<25?' r':ep<50?' y':'');
  document.getElementById('eht').textContent=ef.hp+' / '+ef.mhp;document.getElementById('ehp').textContent=Math.round(ep)+'%';
  let eS='';if(ef.status)eS+='<span class="sch '+ef.status+'">'+ef.status+'</span>';if(ef.confused)eS+='<span class="sch confused">confused</span>';document.getElementById('esc').innerHTML=eS;
  document.getElementById('tnc').textContent='Turn '+BAT.turn;updW();rMoves(pf);rSw();updSp(pSp,pf.e);updSp(eSp,ef.e);}

function rMoves(f){const g=document.getElementById('mgrid');g.innerHTML='';
  if(f.mvs.every(m=>m.cpp<=0)){const b=document.createElement('button');b.className='mb';b.innerHTML='<div class="mbt"><span class="mbn">😤 Struggle</span><span class="mbpp" style="color:#f87171">0 PP</span></div><div class="mbm"><span class="mc physical">physical</span><span class="mpw">PWR 50</span></div>';b.onclick=()=>playerMove(0);g.appendChild(b);return;}
  f.mvs.forEach((m,i)=>{const b=document.createElement('button');b.className='mb';b.disabled=m.cpp<=0||BAT.busy||BAT.over;
    const ppP=m.pp>0?(m.cpp/m.pp)*100:0,ppC=ppP>50?(TPCSS[m.tp]||'#22c55e'):ppP>25?'#eab308':'#ef4444';
    b.style.borderColor=(TPCSS[m.tp]||'#555')+'30';
    b.innerHTML='<div class="mbt"><span class="mbn">'+m.n+'</span><span class="mbpp">'+m.cpp+'/'+m.pp+'</span></div><div class="mbm"><span class="tp tp-'+m.tp+'" style="font-size:.46rem;padding:0 4px">'+m.tp+'</span><span class="mc '+m.c+'">'+m.c+'</span>'+(m.pw>0?'<span class="mpw">PWR '+m.pw+'</span>':'')+(m.ac<100?'<span class="mpw">ACC '+m.ac+'%</span>':'')+'</div><div class="ppb"><div class="ppf" style="width:'+ppP+'%;background:'+ppC+'"></div></div>';
    b.onclick=()=>playerMove(i);g.appendChild(b);});}

function rSw(){const p=document.getElementById('swp');p.innerHTML='';BAT.pTeam.forEach((f,i)=>{const b=document.createElement('button');b.className='swb';b.disabled=f.fainted||i===BAT.pIdx;const hp=Math.max(0,(f.hp/f.mhp)*100),hc=hp<25?'#ef4444':hp<50?'#eab308':'#22c55e';b.innerHTML='<span class="swe">'+f.e+'</span><span class="swn">'+f.n+'</span><div class="swhp"><div class="swhpf" style="width:'+hp+'%;background:'+hc+'"></div></div><span style="font-size:.46rem;color:var(--muted)">'+(f.fainted?'💀':Math.round(hp)+'%')+'</span>';b.onclick=()=>switchTo(i);p.appendChild(b);});}

function entryAbl(f,foe){if(!f.abl)return;
  if(f.abl==='Hope and Change')stUp(f,'spa',1);else if(f.abl==='Mar-a-Lago Defense')f.stg={atk:0,def:0,spa:0,spd:0,spe:0};
  else if(f.abl==='Morning in America'){BAT.weather='sunny';BAT.wT=5;blog('<span class="ls">☀️ Morning in America!</span>');updW();}
  else if(f.abl==='Social Credit'&&foe)stUp(foe,'atk',-1);else if(f.abl==='Great Leap'){stUp(f,'atk',1);stUp(f,'spa',1);}
  else if(f.abl==='Flip-Flopper')stUp(f,'spa',1);else if(f.abl==='Algorithm'&&foe)blog('<span class="ls">🤖 '+f.n+' knows '+foe.n+"'s moves!</span>");
  else if(f.abl==='Blitz Speed')stUp(f,'spe',1);else if(f.abl==='Emperor Complex')stUp(f,'atk',1);}

function init(){init3D();animate();let st;try{const r=sessionStorage.getItem('politiBattleState');st=r?JSON.parse(r):null;}catch(e){}
  if(st?.pTeam?.length&&st?.aTeam?.length){
    if(st.pTeam[0].mhp){BAT={pTeam:st.pTeam,aTeam:st.aTeam,pIdx:st.pIdx||0,aIdx:st.aIdx||0,weather:st.weather||null,wT:st.wT||0,turn:st.turn||1,busy:false,over:false,pHz:st.pHz||[],aHz:st.aHz||[],kosDealt:0};
      [...BAT.pTeam,...BAT.aTeam].forEach(f=>{if(!f.stg)f.stg={atk:0,def:0,spa:0,spd:0,spe:0};if(f.confused===undefined)f.confused=false;if(f.confuseTurns===undefined)f.confuseTurns=0;if(f.flinched===undefined)f.flinched=false;if(f._silenced===undefined)f._silenced=false;if(f.lockedMove===undefined)f.lockedMove=null;f.mvs=(f.mvs||[]).map(m=>({...m,cpp:m.cpp!==undefined?m.cpp:m.pp||10}));});}
    else{BAT={pTeam:st.pTeam.map(p=>buildF(p,true)),aTeam:st.aTeam.map(p=>buildF(p,false)),pIdx:0,aIdx:0,weather:null,wT:0,turn:1,busy:false,over:false,pHz:[],aHz:[],kosDealt:0};}}
  else{const d=demoR();BAT={pTeam:d.pTeam.map(p=>buildF(p,true)),aTeam:d.aTeam.map(p=>buildF(p,false)),pIdx:0,aIdx:0,weather:null,wT:0,turn:1,busy:false,over:false,pHz:[],aHz:[],kosDealt:0};}
  updSp(pSp,BAT.pTeam[BAT.pIdx].e);updSp(eSp,BAT.aTeam[BAT.aIdx].e);
  entryAbl(BAT.pTeam[BAT.pIdx],BAT.aTeam[BAT.aIdx]);entryAbl(BAT.aTeam[BAT.aIdx],BAT.pTeam[BAT.pIdx]);
  camDef();updHUD();blog('<span class="li">⚔️ BATTLE START!</span>');blog('<span class="li">'+BAT.pTeam[BAT.pIdx].n+' vs '+BAT.aTeam[BAT.aIdx].n+'!</span>');blog('<span class="ls">🎯 Choose your move!</span>');}
