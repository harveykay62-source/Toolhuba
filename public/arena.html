<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PolitiBattle — 3D Arena | ToolHub AI</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Russo+One&family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   POLITIBATTLE 3D ARENA — STYLES
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --r: #ef4444; --b: #3b82f6; --g: #22c55e; --gold: #f59e0b;
  --bg: #08090f; --card: rgba(255,255,255,.04); --bdr: rgba(255,255,255,.07);
  --muted: #64748b; --font-retro: 'Press Start 2P', monospace;
  --font-head: 'Russo One', sans-serif; --font-num: 'Orbitron', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
body { font-family: 'Inter', sans-serif; color: #e2e8f0; }

/* ── THREE.JS CANVAS ── */
#arena-canvas { position: fixed; inset: 0; z-index: 0; }

/* ── BACK BUTTON ── */
#back-btn {
  position: fixed; top: 14px; left: 14px; z-index: 100;
  background: rgba(0,0,0,.7); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
  padding: 7px 16px; color: #94a3b8; font-size: .78rem; font-weight: 600;
  text-decoration: none; transition: all .2s; font-family: inherit;
}
#back-btn:hover { color: #fff; background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.25); }

/* ── TURN COUNTER ── */
#turn-counter {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 100;
  font-family: var(--font-retro); font-size: .6rem; color: #94a3b8;
  background: rgba(0,0,0,.65); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 12px;
  padding: 5px 14px; text-align: center;
}

/* ── WEATHER BADGE ── */
#weather-badge {
  position: fixed; top: 42px; left: 50%; transform: translateX(-50%); z-index: 100;
  font-family: var(--font-retro); font-size: .5rem; color: #93c5fd;
  background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.15); border-radius: 16px;
  padding: 3px 12px; display: none;
}

/* ── HP BOXES ── */
.hp-box {
  position: fixed; z-index: 100;
  background: rgba(4,4,13,.92); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 14px;
  padding: 12px 14px; min-width: 220px;
}
.hp-box.player { bottom: 200px; left: 14px; }
.hp-box.enemy { top: 14px; right: 14px; }
.hp-name { font-weight: 800; font-size: .82rem; color: #fff; }
.hp-lv { font-size: .58rem; color: var(--muted); }
.hp-types { display: flex; gap: 2px; margin-top: 3px; flex-wrap: wrap; }
.type-badge {
  display: inline-block; padding: 1px 6px; border-radius: 12px;
  font-size: .52rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
}
.type-badge.Republican { background: rgba(239,68,68,.18); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
.type-badge.Democrat { background: rgba(59,130,246,.18); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
.type-badge.Libertarian { background: rgba(234,179,8,.18); color: #fde047; border: 1px solid rgba(234,179,8,.3); }
.type-badge.Green { background: rgba(34,197,94,.18); color: #86efac; border: 1px solid rgba(34,197,94,.3); }
.type-badge.Socialist { background: rgba(236,72,153,.18); color: #f9a8d4; border: 1px solid rgba(236,72,153,.3); }
.type-badge.Authoritarian { background: rgba(124,58,237,.18); color: #c4b5fd; border: 1px solid rgba(124,58,237,.3); }
.type-badge.Centrist { background: rgba(148,163,184,.18); color: #cbd5e1; border: 1px solid rgba(148,163,184,.3); }
.type-badge.Populist { background: rgba(249,115,22,.18); color: #fdba74; border: 1px solid rgba(249,115,22,.3); }
.type-badge.Corporate { background: rgba(71,85,105,.22); color: #94a3b8; border: 1px solid rgba(71,85,105,.4); }
.type-badge.Revolutionary { background: rgba(220,38,38,.18); color: #fda4af; border: 1px solid rgba(220,38,38,.35); }
.hp-bar-track {
  height: 8px; border-radius: 4px; background: rgba(255,255,255,.1);
  overflow: hidden; margin-top: 6px;
}
.hp-bar-fill {
  height: 100%; border-radius: 4px;
  transition: width .5s ease, background .5s;
  background: linear-gradient(90deg, #22c55e, #4ade80);
}
.hp-bar-fill.yellow { background: linear-gradient(90deg, #eab308, #fde047); }
.hp-bar-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }
.hp-text {
  display: flex; justify-content: space-between;
  font-size: .58rem; color: var(--muted); margin-top: 2px;
}
.status-chips { margin-top: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
.status-chip {
  padding: 1px 6px; border-radius: 5px; font-size: .52rem;
  font-weight: 700; text-transform: uppercase;
}
.status-chip.burn { background: rgba(239,68,68,.25); color: #fca5a5; }
.status-chip.paralysis { background: rgba(234,179,8,.25); color: #fde047; }
.status-chip.sleep { background: rgba(148,163,184,.25); color: #cbd5e1; }
.status-chip.poison, .status-chip.toxic { background: rgba(168,85,247,.25); color: #d8b4fe; }
.status-chip.freeze { background: rgba(147,197,253,.3); color: #bfdbfe; }
.status-chip.item { background: rgba(245,158,11,.15); color: var(--gold); }

/* ── BATTLE LOG ── */
#battle-log {
  position: fixed; bottom: 145px; left: 50%; transform: translateX(-50%);
  z-index: 100; width: min(600px, 90vw);
  background: rgba(0,0,0,.75); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
  padding: 8px 12px; max-height: 70px; overflow-y: auto;
  font-family: var(--font-retro); font-size: .5rem; line-height: 2;
  color: #94a3b8;
}
#battle-log p { margin-bottom: 1px; animation: logIn .15s ease-out; }
@keyframes logIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.li { color: #fff; } .le { color: var(--gold); } .ld { color: #f87171; }
.lh { color: #4ade80; } .ls { color: #c4b5fd; } .lc { color: #fbbf24; font-weight: bold; }

/* ── MOVE PANEL ── */
#move-panel {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: 100; width: min(620px, 94vw);
  display: grid; grid-template-columns: 1fr 1fr; gap: 7px;
}
.move-btn {
  background: rgba(8,10,20,.92); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 11px;
  padding: 9px 11px; cursor: pointer; transition: all .2s; text-align: left;
  position: relative; overflow: hidden;
}
.move-btn:hover:not(:disabled) {
  transform: translateY(-2px); border-color: rgba(255,255,255,.25);
  background: rgba(20,22,40,.95);
}
.move-btn:disabled { opacity: .4; cursor: not-allowed; }
.move-btn .mv-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
.move-btn .mv-name { font-weight: 700; font-size: .76rem; color: #fff; }
.move-btn .mv-pp { font-size: .58rem; color: var(--muted); }
.move-btn .mv-meta { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 2px; }
.mv-cat {
  font-size: .52rem; padding: 1px 6px; border-radius: 7px;
  font-weight: 600; text-transform: uppercase;
}
.mv-cat.physical { background: rgba(249,115,22,.2); color: #fdba74; border: 1px solid rgba(249,115,22,.3); }
.mv-cat.special { background: rgba(99,102,241,.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); }
.mv-cat.status { background: rgba(148,163,184,.2); color: #cbd5e1; border: 1px solid rgba(148,163,184,.3); }
.mv-stat { font-size: .55rem; color: var(--muted); }
.pp-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,.1); margin-top: 4px; overflow: hidden; }
.pp-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* ── CONTROLS ROW ── */
#controls-row {
  position: fixed; bottom: 130px; right: 14px; z-index: 100;
  display: flex; gap: 6px; align-items: center;
}
.ctrl-btn {
  padding: 5px 12px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,.1); background: rgba(0,0,0,.7);
  color: var(--muted); font-size: .72rem; font-weight: 600;
  cursor: pointer; transition: all .2s; backdrop-filter: blur(8px);
  font-family: inherit;
}
.ctrl-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
.ctrl-btn.danger { color: #f87171; border-color: rgba(239,68,68,.3); }
.ctrl-btn.danger:hover { background: rgba(239,68,68,.1); }

/* ── SWITCH PANEL ── */
#switch-panel {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: 101; width: min(620px, 94vw);
  display: none; grid-template-columns: repeat(3, 1fr); gap: 7px;
}
#switch-panel.open { display: grid; }
.sw-btn {
  background: rgba(8,10,20,.92); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 11px;
  padding: 8px; cursor: pointer; transition: all .2s; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.sw-btn:hover:not(:disabled) { border-color: rgba(255,255,255,.2); background: rgba(20,22,40,.95); }
.sw-btn:disabled { opacity: .4; cursor: not-allowed; }
.sw-emoji { font-size: 1.6rem; }
.sw-name { font-size: .66rem; font-weight: 600; color: #fff; }
.sw-hp-bar { width: 100%; height: 4px; border-radius: 2px; background: rgba(255,255,255,.1); overflow: hidden; }
.sw-hp-fill { height: 100%; border-radius: 2px; }

/* ── SOUND CONTROLS ── */
#sound-ctrl {
  position: fixed; top: 14px; right: 14px; z-index: 200;
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
  padding: 4px 10px;
}
#mute-btn {
  background: none; border: none; color: #fff;
  font-size: 1rem; cursor: pointer; padding: 0;
}
#vol-slider { width: 55px; accent-color: #22c55e; }

/* ── DAMAGE FLOATERS ── */
.dmg-float {
  position: fixed; font-family: var(--font-num); font-size: 1.4rem;
  font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,.9);
  animation: dmgFly 1.1s ease-out forwards; pointer-events: none; z-index: 150; color: #fff;
}
@keyframes dmgFly {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  28% { transform: translateY(-28px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-80px) scale(.7); }
}
.dmg-float.crit { color: #fbbf24; font-size: 1.8rem; }
.dmg-float.heal { color: #4ade80; }
.dmg-float.miss { color: #94a3b8; font-size: .95rem; }
.dmg-float.se { color: #ff6b6b; }
.dmg-float.resist { color: #64748b; }

/* ── CRIT BANNER ── */
.crit-banner {
  position: fixed; top: 36%; left: 50%; transform: translate(-50%, -50%);
  font-family: var(--font-retro); font-size: .82rem;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px #fbbf24);
  animation: critPop 1s ease-out forwards; z-index: 160; pointer-events: none;
}
@keyframes critPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
  25% { opacity: 1; transform: translate(-50%, -55%) scale(1.3); }
  55% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -75%) scale(.8); }
}

/* ── KO TEXT ── */
.ko-text {
  position: fixed; font-family: var(--font-retro); font-size: 2.6rem;
  color: #ef4444; text-shadow: 0 0 40px #ef4444, 0 0 80px #ef4444;
  animation: koAnim 1.3s ease-out forwards; z-index: 160; pointer-events: none;
}
@keyframes koAnim {
  0% { opacity: 0; transform: scale(.2) rotate(-10deg); }
  28% { opacity: 1; transform: scale(1.4) rotate(5deg); }
  55% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.2); }
}

/* ── VICTORY / DEFEAT OVERLAY ── */
#end-overlay {
  position: fixed; inset: 0; z-index: 300; display: none;
  align-items: center; justify-content: center; flex-direction: column;
  background: rgba(0,0,0,.85); backdrop-filter: blur(12px);
}
#end-overlay.active { display: flex; }
#end-emoji { font-size: 5rem; animation: endBounce 1s ease-out; margin-bottom: 16px; }
@keyframes endBounce {
  0% { transform: scale(0) rotate(-20deg); }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1); }
}
#end-title {
  font-family: var(--font-head); font-size: clamp(2rem, 6vw, 3.8rem);
  color: var(--gold); margin-bottom: 10px;
}
#end-sub { font-size: .95rem; color: var(--muted); margin-bottom: 32px; }
#end-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.end-btn {
  padding: 11px 26px; border-radius: 12px; font-weight: 700;
  font-size: .88rem; border: none; cursor: pointer; transition: all .2s;
  font-family: inherit;
}
.end-btn.primary { background: linear-gradient(135deg, var(--gold), #d97706); color: #000; }
.end-btn.primary:hover { transform: scale(1.05); box-shadow: 0 8px 28px rgba(245,158,11,.3); }
.end-btn.secondary { background: var(--card); border: 1px solid var(--bdr); color: var(--muted); }
.end-btn.secondary:hover { color: #fff; background: rgba(255,255,255,.08); }

/* ── BATTLE TIMER ── */
#battle-timer {
  position: fixed; top: 68px; right: 14px; z-index: 100;
  display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
}
.timer-num {
  font-family: var(--font-num); font-size: .8rem;
  font-weight: 700; color: #fff;
}
.timer-num.urgent { color: #ef4444; animation: tPulse .5s ease-in-out infinite alternate; }
@keyframes tPulse { 0% { opacity: 1; } 100% { opacity: .5; } }
.timer-bar-wrap {
  width: 70px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.1); overflow: hidden;
}
.timer-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width 1s linear, background .3s;
  background: linear-gradient(90deg, #22c55e, #4ade80);
}
.timer-bar-fill.yellow { background: linear-gradient(90deg, #eab308, #fde047); }
.timer-bar-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  #move-panel { grid-template-columns: 1fr; }
  #switch-panel { grid-template-columns: repeat(2, 1fr); }
  .hp-box { min-width: 160px; padding: 8px 10px; }
  .hp-box.player { bottom: 240px; }
  .hp-name { font-size: .72rem; }
  #battle-log { bottom: 185px; font-size: .45rem; }
  #controls-row { bottom: 170px; }
}
</style>
</head>
<body>

<!-- ═══ BACK BUTTON ═══ -->
<a href="/politibattle" id="back-btn">← Back to PolitiBattle</a>

<!-- ═══ TURN COUNTER ═══ -->
<div id="turn-counter">Turn 1</div>

<!-- ═══ WEATHER BADGE ═══ -->
<div id="weather-badge"></div>

<!-- ═══ SOUND CONTROLS ═══ -->
<div id="sound-ctrl">
  <button id="mute-btn" onclick="toggleMute()">🔊</button>
  <input type="range" id="vol-slider" min="0" max="100" value="70" oninput="setVolume(this.value)">
</div>

<!-- ═══ BATTLE TIMER ═══ -->
<div id="battle-timer">
  <div class="timer-num" id="timer-num">60</div>
  <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
</div>

<!-- ═══ ENEMY HP BOX ═══ -->
<div class="hp-box enemy" id="enemy-hp-box">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="hp-name" id="e-name">—</div>
      <div class="hp-lv" id="e-lv">Lv.50</div>
    </div>
    <div class="hp-types" id="e-types"></div>
  </div>
  <div class="hp-bar-track"><div class="hp-bar-fill" id="e-hp-fill" style="width:100%"></div></div>
  <div class="hp-text"><span>HP</span><span id="e-hp-text">—</span></div>
  <div class="status-chips" id="e-chips"></div>
</div>

<!-- ═══ PLAYER HP BOX ═══ -->
<div class="hp-box player" id="player-hp-box">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="hp-name" id="p-name">—</div>
      <div class="hp-lv" id="p-lv">Lv.50</div>
    </div>
    <div class="hp-types" id="p-types"></div>
  </div>
  <div class="hp-bar-track"><div class="hp-bar-fill" id="p-hp-fill" style="width:100%"></div></div>
  <div class="hp-text"><span>HP</span><span id="p-hp-text">—</span></div>
  <div class="status-chips" id="p-chips"></div>
</div>

<!-- ═══ BATTLE LOG ═══ -->
<div id="battle-log"><p class="li">Battle begins!</p></div>

<!-- ═══ MOVE PANEL ═══ -->
<div id="move-panel"></div>

<!-- ═══ SWITCH PANEL ═══ -->
<div id="switch-panel"></div>

<!-- ═══ CONTROLS ROW ═══ -->
<div id="controls-row">
  <button class="ctrl-btn" id="switch-toggle" onclick="toggleSwitch()">🔄 Switch</button>
  <button class="ctrl-btn" onclick="showItem()">🎒 Item</button>
  <button class="ctrl-btn danger" onclick="forfeit()">🏳️ Forfeit</button>
</div>

<!-- ═══ END OVERLAY ═══ -->
<div id="end-overlay">
  <div id="end-emoji">🏆</div>
  <div id="end-title">VICTORY!</div>
  <div id="end-sub">Your team crushed it!</div>
  <div id="end-actions">
    <button class="end-btn primary" onclick="location.href='/politibattle'">⚔️ Play Again</button>
    <button class="end-btn secondary" onclick="location.href='/politibattle'">🏠 Home</button>
  </div>
</div>

<!-- ═══ THREE.JS CANVAS CONTAINER ═══ -->
<div id="arena-canvas"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════
   SECTION 1: TYPE CHART, MOVES & POLITICIANS DATA
   ═══════════════════════════════════════════════════════════════════════ */

   ═══════════════════════════════════════════════════════════════════════ */

function cHP(b,lv=50){return Math.floor((2*b+31+Math.floor(85/4))*lv/100)+lv+10}
function cSt(b,lv=50){return Math.floor(((2*b+31+Math.floor(85/4))*lv/100)+5)}
function typeEff(mtp,dtps){let m=1;for(const dt of dtps){const r=TC[mtp];if(r&&r[dt]!==undefined)m*=r[dt];}return m;}
function effSt(f,s){
  const base=f.bs[s];const stg=Math.max(-6,Math.min(6,f.stg[s]));
  const m=stg>=0?(2+stg)/2:2/(2+Math.abs(stg));
  let v=Math.max(1,Math.floor(base*m));
  if(s==='spe'&&f.status==='paralysis')v=Math.floor(v*.5);
  return v;
}
function calcDmg(atk,def,mv,weather){
  if(mv.pw<=0)return{dmg:0,isCrit:false,eff:1};
  const lv=50;
  let as=mv.c==='physical'?effSt(atk,'atk'):effSt(atk,'spa');
  let ds=mv.c==='physical'?effSt(def,'def'):effSt(def,'spd');
  if(atk.status==='burn'&&mv.c==='physical')as=Math.floor(as*.5);
  if(def.abl==='Turtle Defense')ds=Math.floor(ds/.75);
  const stab=atk.tps.includes(mv.tp)?1.5:1;
  const eff=typeEff(mv.tp,def.tps);if(eff===0)return{dmg:0,isCrit:false,eff:0};
  let critR=0.0417;
  if(atk.abl==='KGB Training')critR+=.5;
  if(atk.abl==='Camelot Crits')critR*=2;
  if(atk.abl==='Veni Vidi Vici'&&!atk._firstMoved)critR=1;
  const isCrit=Math.random()<critR;
  const critMul=isCrit?(atk.abl==='Four Score Crits'?3:1.5):1;
  let wm=1;
  if(weather==='sunny'){if(mv.tp==='Green')wm=1.5;else if(mv.tp==='Democrat'&&mv.c==='special')wm=.5;}
  if(weather==='rain'){if(mv.tp==='Democrat'&&mv.c==='special')wm=1.5;else if(mv.tp==='Republican')wm=.5;}
  let ib=1;
  if(atk.abl==='Twitter Finger'&&mv.c==='special')ib*=1.1;
  if(atk.abl==='One Death Is a Tragedy'&&mv.c==='physical')ib*=1.2;
  let dmg=Math.floor((((2*lv/5+2)*mv.pw*as/ds)/50+2)*stab*eff*critMul*wm*ib);
  dmg=Math.max(1,Math.floor(dmg*(.85+Math.random()*.15)));
  return{dmg,isCrit,eff};
}
function buildFighter(pol,isP){
  const s=pol.bs;const mhp=cHP(s.hp);
  const bs={atk:cSt(s.atk),def:cSt(s.def),spa:cSt(s.spa),spd:cSt(s.spd),spe:cSt(s.spe)};
  return{id:pol.id,n:pol.n,e:pol.e,tps:[...pol.tps],abl:pol.abl,itm:pol.itm,
    isP,mhp,hp:mhp,status:null,txCnt:0,slpT:0,stg:{atk:0,def:0,spa:0,spd:0,spe:0},
    mvs:pol.mvs.map(m=>({...m,cpp:m.pp})),bs,fainted:false,_endu:0,_firstMoved:false,_rl:false,
    confused:false,confuseTurns:0,flinched:false,lockedMove:null};
}
function rawDmg(f,amt,b){
  if(amt>=f.hp&&f.hp>0){
    if(f.abl==='Long Walk Endure'&&f._endu<2){f._endu++;f.hp=1;blog(`<span class="ls">🛡️ ${f.n} endures at 1 HP!</span>`);return 0;}
  }
  const prev=f.hp;f.hp=Math.max(0,f.hp-amt);if(f.hp===0)f.fainted=true;return prev-f.hp;
}
function healF(f,amt){f.hp=Math.min(f.mhp,f.hp+amt);f.fainted=false;}
function stUp(f,s,n){
  const prev=f.stg[s];f.stg[s]=Math.max(-6,Math.min(6,f.stg[s]+n));
  if(f.stg[s]!==prev){
    const nm={atk:'Attack',def:'Defense',spa:'Sp.Atk',spd:'Sp.Def',spe:'Speed'}[s]||s;
    blog(`<span class="ls">📊 ${f.n}'s ${nm} ${n>0?(Math.abs(n)>=2?'sharply ':'')+'rose':(Math.abs(n)>=2?'sharply ':'')+'fell'}!</span>`);
  }
}
async function statusCheck(f){
  if(f.flinched){f.flinched=false;blog(`<span class="ls">😨 ${f.n} flinched!</span>`);await delay(500);return false;}
  if(f.status==='freeze'){if(Math.random()<.2){f.status=null;blog(`<span class="ls">🔥 ${f.n} thawed!</span>`);}else{blog(`<span class="ls">🧊 ${f.n} is frozen!</span>`);await delay(600);return false;}}
  if(f.status==='sleep'){f.slpT--;if(f.slpT<=0){f.status=null;blog(`<span class="ls">😴 ${f.n} woke up!</span>`);}else{blog(`<span class="ls">💤 ${f.n} is asleep!</span>`);await delay(600);return false;}}
  if(f.status==='paralysis'&&Math.random()<.25){blog(`<span class="ls">⚡ ${f.n} is paralyzed!</span>`);await delay(600);return false;}
  if(f.confused){
    f.confuseTurns--;
    if(f.confuseTurns<=0){f.confused=false;blog(`<span class="ls">😵 ${f.n} snapped out!</span>`);}
    else{blog(`<span class="ls">😵 ${f.n} is confused!</span>`);
      if(Math.random()<.33){const sd=Math.max(1,Math.floor((40*(f.bs.atk/Math.max(1,f.bs.def)))/4));rawDmg(f,sd);blog(`<span class="ld">💥 Hurt itself! (${sd})</span>`);await delay(600);return false;}
    }
  }
  return true;
}
async function applyEf(atk,def,m){
  const e=m.ef;if(!e)return;
  if(e.heal&&e.self){const amt=Math.floor(atk.mhp*e.heal);healF(atk,amt);blog(`<span class="lh">💊 ${atk.n} restored ${amt} HP!</span>`);}
  if(e.up&&e.self)Object.entries(e.up).forEach(([s,v])=>stUp(atk,s,v));
  if(e.dn&&e.tgt)Object.entries(e.dn).forEach(([s,v])=>stUp(def,s,-v));
  const chance=e.chance||100;
  if(e.status&&!def.status&&Math.random()*100<chance){
    def.status=e.status;if(e.status==='sleep')def.slpT=1+Math.floor(Math.random()*3);
    if(e.status==='toxic')def.txCnt=0;
    blog(`<span class="ls">🔴 ${def.n} is now ${e.status.toUpperCase()}!</span>`);
  }
  if(e.confuse&&!def.confused&&Math.random()*100<e.confuse){
    def.confused=true;def.confuseTurns=2+Math.floor(Math.random()*4);
    blog(`<span class="ls">😵 ${def.n} became confused!</span>`);
  }
  if(e.hz){const arr=atk.isP?BAT.aHz:BAT.pHz;if(!arr.includes(e.hz)){arr.push(e.hz);blog(`<span class="ls">🗺️ Hazard set!</span>`);}}
  if(e.weather){BAT.weather=e.weather;BAT.wT=5;blog(`<span class="ls">${{sunny:'☀️ Sun!',rain:'🌧️ Rain!',sandstorm:'🌪️ Sandstorm!',hail:'❄️ Hail!'}[e.weather]}</span>`);updateWeatherBadge();}
  if(e.clearHz){const arr=atk.isP?BAT.pHz:BAT.aHz;arr.length=0;blog(`<span class="ls">🧹 Hazards cleared!</span>`);}
  if(e.cureStatus&&e.self){atk.status=null;blog(`<span class="lh">✨ ${atk.n} cured!</span>`);}
  if(e.flinch&&Math.random()*100<(e.chance||100))def.flinched=true;
  if(e.recoil){const rd=Math.floor(atk.mhp*e.recoil);rawDmg(atk,rd);blog(`<span class="ld">💢 ${atk.n} took ${rd} recoil!</span>`);}
}
function hazDmg(f,hz){hz.forEach(h=>{
  if(h==='stealthRock'){const d=Math.floor(f.mhp/8);rawDmg(f,d);blog(`<span class="ld">⛰️ Scandal Stones! (${d})</span>`);}
  if(h==='spikes'){const d=Math.floor(f.mhp/10);rawDmg(f,d);blog(`<span class="ld">🗡️ Spikes! (${d})</span>`);}
  if(h==='stickyWeb')stUp(f,'spe',-1);
});}
function eotFx(f){
  if(!f||f.fainted)return;
  if(f.status==='burn'){const d=Math.floor(f.mhp/16);rawDmg(f,d);blog(`<span class="ld">🔥 Burn! (${d})</span>`);}
  if(f.status==='poison'){const d=Math.floor(f.mhp/8);rawDmg(f,d);blog(`<span class="ld">☠️ Poison! (${d})</span>`);}
  if(f.status==='toxic'){f.txCnt++;const d=Math.floor(f.mhp/16*f.txCnt);rawDmg(f,d);blog(`<span class="ld">💀 Toxic! (${d})</span>`);}
  if(f.abl==='New Deal HP'){healF(f,Math.floor(f.mhp/8));}
  if(f.abl==="Sorry Not Sorry"){healF(f,Math.floor(f.mhp*.1));}
}
function entryAbl(f,foe){
  if(!f.abl)return;
  if(f.abl==='Hope and Change')stUp(f,'spa',1);
  else if(f.abl==='Social Credit'&&foe)stUp(foe,'atk',-1);
  else if(f.abl==='Great Leap'){stUp(f,'atk',1);stUp(f,'spa',1);}
  else if(f.abl==='Flip-Flopper')stUp(f,'spa',1);
  else if(f.abl==='Morning in America'){BAT.weather='sunny';BAT.wT=5;blog('<span class="ls">☀️ Morning in America!</span>');updateWeatherBadge();}
}
async function execMove(atk,def,idx,isP){
  const m={...atk.mvs[idx]};atk.mvs[idx].cpp=Math.max(0,atk.mvs[idx].cpp-1);
  blog(`<span class="li">⚡ ${atk.n} used <strong>${m.n}</strong>!</span>`);
  if(Math.random()*100>m.ac){blog(`<span class="ls">😮 But it missed!</span>`);await delay(400);return;}
  // Run 3D attack animation
  await animateAttack(isP,m);
  if(m.c==='status'){await delay(300);await applyEf(atk,def,m);updateAllHP();return;}
  await delay(150);
  const{dmg,isCrit,eff}=calcDmg(atk,def,m,BAT.weather);
  if(eff===0){blog(`<span class="ls">🛡️ No effect!</span>`);await delay(400);return;}
  if(isCrit)blog(`<span class="lc">💥 Critical hit!</span>`);
  if(eff>1)blog(`<span class="le">🔥 Super effective! (${eff}x)</span>`);
  else if(eff<1)blog(`<span class="ls">🛡️ Not very effective...</span>`);
  // Defender recoil in 3D
  shakeDefender(!isP);
  if(isCrit){spawnCritBanner();triggerCameraShake();}
  const realDmg=rawDmg(def,dmg);
  blog(`<span class="ld">Dealt ${realDmg} dmg (${Math.round(realDmg/def.mhp*100)}%)</span>`);
  spawnDmgFloat(dmg,isCrit?'crit':eff>1?'se':eff<1?'resist':'',!isP);
  await delay(300);
  await applyEf(atk,def,m);
  if(def.abl==='Clap Back'&&m.c==='physical'){const cd=Math.floor(dmg*.3);rawDmg(atk,cd);blog(`<span class="ld">👏 Clap Back! ${cd}!</span>`);}
  if(atk.abl==='Once Again Asking'){healF(atk,Math.floor(realDmg*.1));}
  atk._firstMoved=true;
  updateAllHP();
  if(def.fainted){
    blog(`<span class="ld">💀 ${def.n} KO'd!</span>`);
    await animateKO(!isP);
    await delay(800);
    handleKO(def,atk,isP);
    return;
  }
}
function handleKO(def,atk,isP){
  BAT.kosDealt=(BAT.kosDealt||0)+(isP?1:0);
  if(!isP){
    const nx=BAT.aTeam.findIndex((f,i)=>i>BAT.aIdx&&!f.fainted);
    if(nx>=0){BAT.aIdx=nx;blog(`<span class="ls">🔄 ${BAT.aTeam[nx].n} enters!</span>`);hazDmg(BAT.aTeam[nx],BAT.aHz);entryAbl(BAT.aTeam[nx],BAT.pTeam[BAT.pIdx]);switchIn3D(false);updateAll();}
    else endBattle(true);
  } else {
    const nx=BAT.pTeam.findIndex((f,i)=>i>BAT.pIdx&&!f.fainted);
    if(nx>=0){BAT.pIdx=nx;blog(`<span class="ls">🔄 Go, ${BAT.pTeam[nx].n}!</span>`);hazDmg(BAT.pTeam[nx],BAT.pHz);entryAbl(BAT.pTeam[nx],BAT.aTeam[BAT.aIdx]);switchIn3D(true);updateAll();}
    else endBattle(false);
  }
}
async function aiTurn(){
  const ef=BAT.aTeam[BAT.aIdx],pf=BAT.pTeam[BAT.pIdx];
  if(ef.fainted){endTurn();return;}
  if(!await statusCheck(ef)){endTurn();return;}
  const avail=ef.mvs.map((m,i)=>({m,i})).filter(x=>x.m.cpp>0);
  if(!avail.length){endTurn();return;}
  let best=-Infinity,bestIdx=0;
  avail.forEach(({m,i})=>{
    let sc=0;
    if(m.pw>0){const eff=typeEff(m.tp,pf.tps);if(eff===0)return;sc=m.pw*eff;if(ef.tps.includes(m.tp))sc*=1.5;sc*=(m.c==='physical'?ef.bs.atk/Math.max(1,pf.bs.def):ef.bs.spa/Math.max(1,pf.bs.spd));}
    else{sc=30;if(m.ef?.up)sc+=35;if(m.ef?.status&&!pf.status)sc+=28;if(m.ef?.heal&&ef.hp<ef.mhp*.45)sc+=45;}
    if(sc>best){best=sc;bestIdx=i;}
  });
  await execMove(ef,pf,bestIdx,false);
  updateAllHP();
}
function endTurn(){
  if(BAT.over)return;BAT.turn++;
  document.getElementById('turn-counter').textContent=`Turn ${BAT.turn}`;
  if(BAT.weather){BAT.wT--;if(BAT.wT<=0){blog('<span class="ls">🌤️ Weather cleared!</span>');BAT.weather=null;updateWeatherBadge();}}
  eotFx(BAT.pTeam[BAT.pIdx]);eotFx(BAT.aTeam[BAT.aIdx]);
  const pf=BAT.pTeam[BAT.pIdx],ef=BAT.aTeam[BAT.aIdx];
  if(pf.fainted){const nx=BAT.pTeam.findIndex((f,i)=>i>BAT.pIdx&&!f.fainted);if(nx>=0){BAT.pIdx=nx;switchIn3D(true);updateAll();}else{endBattle(false);return;}}
  if(ef.fainted){const nx=BAT.aTeam.findIndex((f,i)=>i>BAT.aIdx&&!f.fainted);if(nx>=0){BAT.aIdx=nx;switchIn3D(false);updateAll();}else{endBattle(true);return;}}
  updateAll();BAT.busy=false;resetTimer();
}
function endBattle(won){
  stopTimer();BAT.over=true;
  const ov=document.getElementById('end-overlay');
  document.getElementById('end-emoji').textContent=won?'🏆':'💀';
  document.getElementById('end-title').textContent=won?'VICTORY!':'DEFEATED!';
  document.getElementById('end-sub').textContent=won?'Your team crushed the opposition!':'The opposition won.';
  if(won)triggerVictoryAnimation();
  setTimeout(()=>ov.classList.add('active'),1200);
}


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 3: GLOBAL BATTLE STATE & INIT
   ═══════════════════════════════════════════════════════════════════════ */

let BAT = null;
let TIMER_INT = null, TIMER_SECS = 60;
let switchOpen = false;
let muted = false;

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function initBattle() {
  // Try loading from sessionStorage
  let state = null;
  try { state = JSON.parse(sessionStorage.getItem('politiBattleState')); } catch(e) {}

  if (state && state.pTeam && state.pTeam.length > 0) {
    BAT = {
      pTeam: state.pTeam, aTeam: state.aTeam,
      pIdx: state.pIdx || 0, aIdx: state.aIdx || 0,
      weather: state.weather || null, wT: state.wT || 0,
      turn: state.turn || 1, pHz: state.pHz || [], aHz: state.aHz || [],
      busy: false, over: false, kosDealt: 0
    };
  } else {
    // Generate random demo battle
    const shuffled = [...POLS].sort(() => Math.random() - .5);
    const pRoster = shuffled.slice(0, 3).map(p => buildFighter(p, true));
    const aRoster = shuffled.slice(3, 6).map(p => buildFighter(p, false));
    BAT = {
      pTeam: pRoster, aTeam: aRoster,
      pIdx: 0, aIdx: 0, weather: null, wT: 0,
      turn: 1, pHz: [], aHz: [], busy: false, over: false, kosDealt: 0
    };
  }

  entryAbl(BAT.pTeam[0], BAT.aTeam[0]);
  entryAbl(BAT.aTeam[0], BAT.pTeam[0]);
  blog(`<span class="li">⚔️ ${BAT.pTeam[0].n} vs ${BAT.aTeam[0].n}!</span>`);
  updateAll();
  startTimer();
}


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 4: HUD / UI FUNCTIONS
   ═══════════════════════════════════════════════════════════════════════ */

function blog(msg) {
  const lg = document.getElementById('battle-log');
  const p = document.createElement('p'); p.innerHTML = msg;
  lg.appendChild(p); lg.scrollTop = lg.scrollHeight;
  // Keep max 8 messages
  while (lg.children.length > 8) lg.removeChild(lg.firstChild);
}

function updateAllHP() {
  const pf = BAT.pTeam[BAT.pIdx], ef = BAT.aTeam[BAT.aIdx];
  updateHP('p', pf); updateHP('e', ef);
}

function updateHP(prefix, f) {
  const fill = document.getElementById(`${prefix}-hp-fill`);
  const text = document.getElementById(`${prefix}-hp-text`);
  const chips = document.getElementById(`${prefix}-chips`);
  if (!fill) return;
  const pct = Math.max(0, (f.hp / f.mhp) * 100);
  fill.style.width = pct + '%';
  fill.className = 'hp-bar-fill' + (pct < 25 ? ' red' : pct < 50 ? ' yellow' : '');
  text.textContent = `${f.hp}/${f.mhp}`;
  let ch = '';
  if (f.status) ch += `<span class="status-chip ${f.status}">${f.status.toUpperCase()}</span>`;
  if (f.confused) ch += `<span class="status-chip" style="background:rgba(234,179,8,.25);color:#fde047">CONFUSED</span>`;
  if (f.itm) ch += `<span class="status-chip item">🎒${f.itm}</span>`;
  chips.innerHTML = ch;
}

function updateAll() {
  if (!BAT) return;
  const pf = BAT.pTeam[BAT.pIdx], ef = BAT.aTeam[BAT.aIdx];
  document.getElementById('p-name').textContent = pf.n;
  document.getElementById('e-name').textContent = ef.n;
  document.getElementById('p-lv').textContent = `Lv.50 | ${pf.abl || ''}`;
  document.getElementById('e-lv').textContent = `Lv.50 | ${ef.abl || ''}`;
  document.getElementById('p-types').innerHTML = pf.tps.map(t => `<span class="type-badge ${t}">${t.charAt(0)}</span>`).join('');
  document.getElementById('e-types').innerHTML = ef.tps.map(t => `<span class="type-badge ${t}">${t.charAt(0)}</span>`).join('');
  updateAllHP();
  renderMoves(pf);
  renderSwitch();
  updateWeatherBadge();
  document.getElementById('turn-counter').textContent = `Turn ${BAT.turn}`;
  // Update 3D fighter meshes
  updateFighterMeshes();
}

function renderMoves(f) {
  const panel = document.getElementById('move-panel');
  panel.innerHTML = '';
  f.mvs.forEach((m, i) => {
    const noPP = m.cpp <= 0;
    const btn = document.createElement('button');
    btn.className = 'move-btn';
    btn.disabled = noPP || BAT.busy || BAT.over;
    const pct = Math.round((m.cpp / m.pp) * 100);
    const ppCol = pct > 50 ? '#22c55e' : pct > 20 ? '#eab308' : '#ef4444';
    // Tint background by type
    const tints = {Republican:'rgba(239,68,68,.08)',Democrat:'rgba(59,130,246,.08)',Libertarian:'rgba(234,179,8,.08)',Green:'rgba(34,197,94,.08)',Socialist:'rgba(236,72,153,.08)',Authoritarian:'rgba(124,58,237,.08)',Centrist:'rgba(148,163,184,.06)',Populist:'rgba(249,115,22,.08)',Corporate:'rgba(71,85,105,.08)',Revolutionary:'rgba(220,38,38,.08)'};
    btn.style.background = tints[m.tp] || 'rgba(8,10,20,.92)';
    btn.innerHTML = `
      <div class="mv-top">
        <span class="mv-name">${m.n}</span>
        <span class="mv-pp" style="color:${noPP?'#ef4444':''}">PP ${m.cpp}/${m.pp}</span>
      </div>
      <div class="mv-meta">
        <span class="type-badge ${m.tp}">${m.tp}</span>
        <span class="mv-cat ${m.c}">${m.c}</span>
        ${m.pw > 0 ? `<span class="mv-stat">PWR ${m.pw}</span>` : ''}
        <span class="mv-stat">ACC ${m.ac}%</span>
      </div>
      <div class="pp-bar"><div class="pp-fill" style="width:${pct}%;background:${ppCol}"></div></div>`;
    if (!noPP) btn.onclick = () => playerMove(i);
    panel.appendChild(btn);
  });
}

function renderSwitch() {
  const panel = document.getElementById('switch-panel');
  panel.innerHTML = '';
  BAT.pTeam.forEach((f, i) => {
    if (i === BAT.pIdx) return;
    const btn = document.createElement('button');
    btn.className = 'sw-btn'; btn.disabled = f.fainted;
    const pct = Math.max(0, f.hp / f.mhp * 100);
    const col = pct > 50 ? '#22c55e' : pct > 25 ? '#eab308' : '#ef4444';
    btn.innerHTML = `
      <div class="sw-emoji">${f.e}</div>
      <div class="sw-name" style="color:${f.fainted?'#ef4444':'#fff'}">${f.n}</div>
      <div class="sw-hp-bar"><div class="sw-hp-fill" style="width:${pct}%;background:${col}"></div></div>`;
    btn.onclick = () => playerSwitch(i);
    panel.appendChild(btn);
  });
}

function toggleSwitch() {
  switchOpen = !switchOpen;
  const sp = document.getElementById('switch-panel');
  const mp = document.getElementById('move-panel');
  const btn = document.getElementById('switch-toggle');
  if (switchOpen) { sp.classList.add('open'); mp.style.display = 'none'; btn.textContent = '⚔️ Fight'; }
  else { sp.classList.remove('open'); mp.style.display = ''; btn.textContent = '🔄 Switch'; }
}

function showItem() {
  if (!BAT) return;
  const pf = BAT.pTeam[BAT.pIdx];
  blog(pf.itm ? `<span class="ls">🎒 ${pf.n} holds ${pf.itm}</span>` : `<span class="ls">No held item!</span>`);
}

function forfeit() { if (BAT && !BAT.over) endBattle(false); }

function updateWeatherBadge() {
  const badge = document.getElementById('weather-badge');
  if (!BAT || !BAT.weather) { badge.style.display = 'none'; return; }
  const names = {sunny:'☀️ Harsh Sun', rain:'🌧️ Heavy Rain', sandstorm:'🌪️ Sandstorm', hail:'❄️ Hailstorm'};
  badge.textContent = names[BAT.weather] || BAT.weather;
  badge.style.display = '';

}

/* ── Timer ── */
function startTimer() {
  stopTimer(); TIMER_SECS = 60; updateTimerUI();
  TIMER_INT = setInterval(() => {
    if (!BAT || BAT.busy || BAT.over) return;
    TIMER_SECS--; updateTimerUI();
    if (TIMER_SECS <= 0) { stopTimer(); autoMove(); }
  }, 1000);
}
function stopTimer() { if (TIMER_INT) { clearInterval(TIMER_INT); TIMER_INT = null; } }
function resetTimer() { stopTimer(); startTimer(); }
function updateTimerUI() {
  const num = document.getElementById('timer-num');
  const bar = document.getElementById('timer-fill');
  num.textContent = TIMER_SECS;
  const pct = (TIMER_SECS / 60) * 100;
  bar.style.width = pct + '%';
  num.className = 'timer-num' + (TIMER_SECS <= 10 ? ' urgent' : '');
  bar.className = 'timer-bar-fill' + (TIMER_SECS <= 10 ? ' red' : TIMER_SECS <= 25 ? ' yellow' : '');
}
function autoMove() {
  if (!BAT || BAT.busy || BAT.over) return;
  const pf = BAT.pTeam[BAT.pIdx];
  const avail = pf.mvs.map((m, i) => ({m, i})).filter(x => x.m.cpp > 0);
  if (avail.length) playerMove(avail[Math.floor(Math.random() * avail.length)].i);
}

/* ── Player Actions ── */
async function playerMove(idx) {
  if (!BAT || BAT.busy || BAT.over) return;
  BAT.busy = true; stopTimer();
  if (switchOpen) toggleSwitch();
  const pf = BAT.pTeam[BAT.pIdx], ef = BAT.aTeam[BAT.aIdx];
  if (pf.fainted) return;
  if (!await statusCheck(pf)) { await delay(500); await doAiTurn(); return; }
  await execMove(pf, ef, idx, true);
  updateAllHP();
  if (!BAT.over && !ef.fainted) { await delay(600); await doAiTurn(); }
  else if (!BAT.over) endTurn();
}
async function playerSwitch(tIdx) {
  if (!BAT || BAT.busy || BAT.over) return;
  BAT.busy = true; if (switchOpen) toggleSwitch();
  const old = BAT.pTeam[BAT.pIdx];
  old.confused = false; old.flinched = false; old.lockedMove = null;
  BAT.pIdx = tIdx;
  const nf = BAT.pTeam[tIdx];
  blog(`<span class="li">🔄 Go, ${nf.n}!</span>`);
  hazDmg(nf, BAT.pHz); entryAbl(nf, BAT.aTeam[BAT.aIdx]);
  switchIn3D(true);
  updateAll();
  await delay(600); await doAiTurn();
}
async function doAiTurn() {
  if (BAT.over) return;
  await delay(500);
  await aiTurn();
  updateAllHP();
  if (!BAT.over) endTurn();
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION 5: THREE.JS 3D SCENE
   ═══════════════════════════════════════════════════════════════════════ */

let scene, camera, renderer, clock;
let playerGroup, enemyGroup, playerFace, enemyFace;
let platformMesh, glowRing, starPoints;
let cameraState = { phase: 'intro', startTime: 0, shaking: false, shakeEnd: 0 };
let playerBaseY = 0.5, enemyBaseY = 0.5;
let capitolPlane;
let particleSystems = [];

function getTypeColor(type) {
  const colors = {
    Republican: 0xef4444, Democrat: 0x3b82f6, Libertarian: 0xeab308,
    Green: 0x22c55e, Socialist: 0xec4899, Authoritarian: 0x7c3aed,
    Centrist: 0x94a3b8, Populist: 0xf97316, Corporate: 0x475569,
    Revolutionary: 0xdc2626
  };
  return colors[type] || 0x6366f1;
}

function init3D() {
  const container = document.getElementById('arena-canvas');
  scene = new THREE.Scene();
  clock = new THREE.Clock();

  // ── Camera ──
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 2, 3); // Start close
  cameraState.phase = 'intro';
  cameraState.startTime = clock.getElapsedTime();

  // ── Renderer ──
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  // ── Lighting ──
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.camera.left = -8;
  dirLight.shadow.camera.right = 8;
  dirLight.shadow.camera.top = 8;
  dirLight.shadow.camera.bottom = -8;
  scene.add(dirLight);

  const redPoint = new THREE.PointLight(0xef4444, 0.8, 15);
  redPoint.position.set(-4, 2, 2);
  scene.add(redPoint);

  const bluePoint = new THREE.PointLight(0x3b82f6, 0.8, 15);
  bluePoint.position.set(4, 2, 2);
  scene.add(bluePoint);

  const hemi = new THREE.HemisphereLight(0x1a1a3e, 0x0a0a15, 0.6);
  scene.add(hemi);

  // ── Skybox (inverted sphere with vertex colours) ──
  const skyGeo = new THREE.SphereGeometry(80, 32, 32);
  const skyColors = [];
  const positions = skyGeo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const y = positions.getY(i);
    const t = (y + 80) / 160; // 0 bottom, 1 top
    const r = 0.024 + t * 0.02;
    const g = 0.051 + t * 0.035;
    const b = 0.1 + t * 0.06;
    skyColors.push(r, g, b);
  }
  skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyColors, 3));
  const skyMat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  // ── Stars ──
  const starGeo = new THREE.BufferGeometry();
  const starPositions = [];
  const starOpacities = [];
  for (let i = 0; i < 200; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.6; // top half mostly
    const r = 60 + Math.random() * 15;
    starPositions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
    starOpacities.push(Math.random());
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  starGeo.setAttribute('opacity', new THREE.Float32BufferAttribute(starOpacities, 1));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.8, sizeAttenuation: true });
  starPoints = new THREE.Points(starGeo, starMat);
  scene.add(starPoints);

  // ── Platform (hexagonal) ──
  const platGeo = new THREE.CylinderGeometry(4, 4, 0.3, 6);
  const platMat = new THREE.MeshStandardMaterial({
    color: 0x1e2035, roughness: 0.6, metalness: 0.3
  });
  platformMesh = new THREE.Mesh(platGeo, platMat);
  platformMesh.receiveShadow = true;
  platformMesh.position.y = -1.05;
  scene.add(platformMesh);

  // ── Glow ring ──
  const ringGeo = new THREE.TorusGeometry(4.1, 0.05, 8, 48);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.6 });
  glowRing = new THREE.Mesh(ringGeo, ringMat);
  glowRing.rotation.x = Math.PI / 2;
  glowRing.position.y = -0.88;
  scene.add(glowRing);

  // ── Grid lines on platform ──
  createHexGrid();

  // ── Capitol silhouette ──
  createCapitolSilhouette();

  // ── Create fighters ──
  if (BAT) {
    playerGroup = createFighterMesh(BAT.pTeam[BAT.pIdx], true);
    enemyGroup = createFighterMesh(BAT.aTeam[BAT.aIdx], false);
    scene.add(playerGroup);
    scene.add(enemyGroup);
  }

  // ── Window resize ──
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

function createHexGrid() {
  const gridMat = new THREE.LineBasicMaterial({ color: 0x2244aa, transparent: true, opacity: 0.15 });
  const points = [];
  // Simple hex pattern
  for (let x = -3.5; x <= 3.5; x += 0.8) {
    for (let z = -3.5; z <= 3.5; z += 0.8) {
      if (Math.sqrt(x*x + z*z) > 3.8) continue;
      const offset = (Math.round(z / 0.8) % 2) * 0.4;
      const cx = x + offset;
      const s = 0.35;
      for (let a = 0; a < 6; a++) {
        const a1 = (Math.PI / 3) * a;
        const a2 = (Math.PI / 3) * (a + 1);
        points.push(new THREE.Vector3(cx + s * Math.cos(a1), -0.89, z + s * Math.sin(a1)));
        points.push(new THREE.Vector3(cx + s * Math.cos(a2), -0.89, z + s * Math.sin(a2)));
      }
    }
  }
  const gridGeo = new THREE.BufferGeometry().setFromPoints(points);
  const grid = new THREE.LineSegments(gridGeo, gridMat);
  scene.add(grid);
}

function createCapitolSilhouette() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 512, 256);
  ctx.fillStyle = 'rgba(255,255,255,1)';
  // Simple Capitol outline
  ctx.fillRect(100, 180, 312, 50);   // base
  ctx.fillRect(130, 130, 252, 70);   // middle
  ctx.fillRect(175, 75, 162, 75);    // upper
  // Dome
  ctx.beginPath();
  ctx.ellipse(256, 75, 55, 40, 0, Math.PI, 0);
  ctx.fill();
  // Spire
  ctx.fillRect(252, 20, 8, 35);

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
  const plane = new THREE.PlaneGeometry(20, 10);
  capitolPlane = new THREE.Mesh(plane, mat);
  capitolPlane.position.set(0, 3, -30);
  scene.add(capitolPlane);
}

function createFighterMesh(fighter, isPlayer) {
  const group = new THREE.Group();

  // Main sphere body
  const geo = new THREE.SphereGeometry(0.9, 32, 32);
  const typeCol = getTypeColor(fighter.tps[0]);
  const mat = new THREE.MeshStandardMaterial({
    color: typeCol, roughness: 0.3, metalness: 0.4,
    emissive: typeCol, emissiveIntensity: 0.15
  });
  const sphere = new THREE.Mesh(geo, mat);
  sphere.castShadow = true;
  group.add(sphere);

  // Emoji face on canvas texture
  const fCanvas = document.createElement('canvas');
  fCanvas.width = 256; fCanvas.height = 256;
  const fCtx = fCanvas.getContext('2d');
  fCtx.clearRect(0, 0, 256, 256);
  fCtx.font = '140px serif';
  fCtx.textAlign = 'center';
  fCtx.textBaseline = 'middle';
  fCtx.fillText(fighter.e, 128, 128);
  const fTex = new THREE.CanvasTexture(fCanvas);
  const faceMat = new THREE.MeshBasicMaterial({ map: fTex, transparent: true });
  const facePlane = new THREE.PlaneGeometry(1.4, 1.4);
  const face = new THREE.Mesh(facePlane, faceMat);
  face.position.z = 0.91;
  face.userData.isFace = true;
  group.add(face);

  // Shadow disc
  const shadowGeo = new THREE.CircleGeometry(0.7, 32);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = -1.05;
  group.add(shadow);

  // Position
  group.position.set(isPlayer ? -3 : 3, 0.5, isPlayer ? 1 : -0.5);
  if (!isPlayer) group.scale.setScalar(0.82);

  // Store references
  if (isPlayer) { playerFace = face; }
  else { enemyFace = face; }

  return group;
}

function updateFighterMeshes() {
  if (!BAT || !scene) return;
  const pf = BAT.pTeam[BAT.pIdx], ef = BAT.aTeam[BAT.aIdx];

  // Remove old groups and recreate
  if (playerGroup) scene.remove(playerGroup);
  if (enemyGroup) scene.remove(enemyGroup);

  playerGroup = createFighterMesh(pf, true);
  enemyGroup = createFighterMesh(ef, false);
  scene.add(playerGroup);
  scene.add(enemyGroup);
}


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 6: ANIMATION LOOP
   ═══════════════════════════════════════════════════════════════════════ */

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const dt = clock.getDelta();

  // ── Camera movements ──
  if (cameraState.phase === 'intro') {
    const elapsed = time - cameraState.startTime;
    const t = Math.min(elapsed / 2.0, 1.0);
    camera.position.z = 3 + t * 5; // 3 -> 8
    camera.position.y = 2 + t * 0.5;
    if (t >= 1.0) cameraState.phase = 'idle';
  }
  else if (cameraState.phase === 'idle') {
    // Gentle bob
    camera.position.y = 2.5 + Math.sin(time * 0.8) * 0.05;
    // Smooth camera X recovery
    camera.position.x += (0 - camera.position.x) * 0.03;
    camera.position.z += (8 - camera.position.z) * 0.03;
  }
  else if (cameraState.phase === 'playerAttack') {
    camera.position.x += (-1 - camera.position.x) * 0.08;
    if (Math.abs(camera.position.x + 1) < 0.05) cameraState.phase = 'idle';
  }
  else if (cameraState.phase === 'enemyAttack') {
    camera.position.x += (1 - camera.position.x) * 0.08;
    if (Math.abs(camera.position.x - 1) < 0.05) cameraState.phase = 'idle';
  }
  else if (cameraState.phase === 'ko') {
    camera.position.z += (6 - camera.position.z) * 0.05;
    if (time - cameraState.startTime > 1.5) cameraState.phase = 'idle';
  }

  // Camera shake
  if (cameraState.shaking && time < cameraState.shakeEnd) {
    camera.position.x += (Math.random() - 0.5) * 0.3;
    camera.position.y += (Math.random() - 0.5) * 0.15;
  }

  camera.lookAt(0, 0.5, 0);

  // ── Fighter idle bob ──
  if (playerGroup) {
    playerGroup.position.y = playerBaseY + Math.sin(time * 2) * 0.08;
  }
  if (enemyGroup) {
    enemyGroup.position.y = enemyBaseY + Math.sin(time * 2 + 1.5) * 0.08;
  }

  // ── Face billboarding ──
  if (playerFace) playerFace.quaternion.copy(camera.quaternion);
  if (enemyFace) enemyFace.quaternion.copy(camera.quaternion);

  // ── Star twinkling ──
  if (starPoints) {
    const opArr = starPoints.geometry.attributes.opacity;
    if (opArr) {
      for (let i = 0; i < opArr.count; i++) {
        opArr.array[i] = 0.3 + Math.sin(time * 1.5 + i * 0.7) * 0.5;
      }
      opArr.needsUpdate = true;
    }
    starPoints.material.opacity = 0.7 + Math.sin(time * 0.3) * 0.15;
  }

  // ── Glow ring pulse ──
  if (glowRing) {
    glowRing.material.opacity = 0.4 + Math.sin(time * 2) * 0.15;
  }

  // ── Particle systems update ──
  updateParticles(time);

  renderer.render(scene, camera);
}


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 7: ATTACK & KO ANIMATIONS
   ═══════════════════════════════════════════════════════════════════════ */

async function animateAttack(isPlayer, move) {
  const attacker = isPlayer ? playerGroup : enemyGroup;
  const defender = isPlayer ? enemyGroup : playerGroup;
  if (!attacker || !defender) return;

  // Camera shift
  cameraState.phase = isPlayer ? 'playerAttack' : 'enemyAttack';

  // Flash glow ring to move type
  const moveColor = getTypeColor(move.tp);
  if (glowRing) {
    glowRing.material.color.setHex(moveColor);
    setTimeout(() => glowRing.material.color.setHex(0x3b82f6), 600);
  }

  // Lunge attacker toward defender
  const origX = attacker.position.x;
  const dir = isPlayer ? 1.5 : -1.5;
  const steps = 10;

  // Forward lunge (200ms)
  for (let i = 0; i < steps; i++) {
    attacker.position.x = origX + dir * (i / steps);
    await delay(20);
  }
  // Back (200ms)
  for (let i = steps; i >= 0; i--) {
    attacker.position.x = origX + dir * (i / steps);
    await delay(20);
  }
  attacker.position.x = origX;

  // Dispatch to per-move signature animation
  const moveId = move ? (move.id || Object.keys(M).find(k => M[k] === move) || '') : '';
  await playMoveAnimation(moveId, attacker, defender, move);
}

function shakeDefender(isEnemy) {
  const mesh = isEnemy ? enemyGroup : playerGroup;
  if (!mesh) return;
  const orig = mesh.position.clone();
  let shakes = 0;
  const int = setInterval(() => {
    if (shakes >= 8) { clearInterval(int); mesh.position.copy(orig); return; }
    mesh.position.x = orig.x + (Math.random() - 0.5) * 0.3;
    mesh.position.z = orig.z + (Math.random() - 0.5) * 0.15;
    shakes++;
  }, 40);

  // Flash white (emissive spike)
  const sphere = mesh.children[0];
  if (sphere && sphere.material) {
    const origEmissive = sphere.material.emissiveIntensity;
    sphere.material.emissiveIntensity = 2.0;
    setTimeout(() => { sphere.material.emissiveIntensity = origEmissive; }, 300);
  }
}

function triggerCameraShake() {
  const time = clock.getElapsedTime();
  cameraState.shaking = true;
  cameraState.shakeEnd = time + 0.4;
  setTimeout(() => { cameraState.shaking = false; }, 420);
}

async function animateKO(isEnemy) {
  const mesh = isEnemy ? enemyGroup : playerGroup;
  if (!mesh) return;

  cameraState.phase = 'ko';
  cameraState.startTime = clock.getElapsedTime();

  // Spawn massive explosion particles
  spawnParticles(mesh.position.clone(), 0xff4444, 80, 3, 5);

  // KO text
  const ko = document.createElement('div');
  ko.className = 'ko-text';
  ko.style.left = (isEnemy ? 65 : 25) + '%';
  ko.style.top = '40%';
  ko.textContent = 'KO!';
  document.body.appendChild(ko);
  setTimeout(() => ko.remove(), 1400);

  // Spin and shrink
  const duration = 600;
  const startTime = performance.now();
  return new Promise(resolve => {
    function shrink(now) {
      const t = Math.min((now - startTime) / duration, 1);
      mesh.rotation.y = t * Math.PI * 4;
      mesh.scale.setScalar(1 - t);
      if (t < 1) requestAnimationFrame(shrink);
      else { scene.remove(mesh); resolve(); }
    }
    requestAnimationFrame(shrink);
  });
}

function switchIn3D(isPlayer) {
  // Remove old mesh and create new one
  if (isPlayer && playerGroup) scene.remove(playerGroup);
  if (!isPlayer && enemyGroup) scene.remove(enemyGroup);

  const f = isPlayer ? BAT.pTeam[BAT.pIdx] : BAT.aTeam[BAT.aIdx];
  const group = createFighterMesh(f, isPlayer);

  // Start off-screen
  group.position.x = isPlayer ? -8 : 8;
  group.scale.setScalar(0.01);

  scene.add(group);
  if (isPlayer) playerGroup = group;
  else enemyGroup = group;

  // Slide in animation
  const targetX = isPlayer ? -3 : 3;
  const targetScale = isPlayer ? 1 : 0.82;
  const startTime = performance.now();
  function slideIn(now) {
    const t = Math.min((now - startTime) / 600, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease out cubic
    group.position.x = (isPlayer ? -8 : 8) + (targetX - (isPlayer ? -8 : 8)) * ease;
    group.scale.setScalar(0.01 + (targetScale - 0.01) * ease);
    if (t < 1) requestAnimationFrame(slideIn);
  }
  requestAnimationFrame(slideIn);
}

function triggerVictoryAnimation() {
  if (!playerGroup) return;
  // Bounce 3 times
  let bounces = 0;
  const bounceInt = setInterval(() => {
    if (bounces >= 6) { clearInterval(bounceInt); return; }
    playerGroup.position.y = bounces % 2 === 0 ? playerBaseY + 0.8 : playerBaseY;
    bounces++;
  }, 200);

  // Gold particle rain
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      spawnParticles(
        new THREE.Vector3((Math.random() - 0.5) * 6, 3, (Math.random() - 0.5) * 4),
        0xf59e0b, 20, 3, 1
      );
    }, i * 300);
  }
}

function updatePlatformGlow() {
  if (!glowRing || !BAT) return;
  const wColors = {sunny: 0xf59e0b, rain: 0x3b82f6, sandstorm: 0xeab308, hail: 0x93c5fd};
  glowRing.material.color.setHex(wColors[BAT.weather] || 0x3b82f6);
}


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 8: PARTICLE SYSTEM
   ═══════════════════════════════════════════════════════════════════════ */

function spawnParticles(position, color, count, spread, speed) {
  const geo = new THREE.BufferGeometry();
  const positions = [];
  const velocities = [];

  for (let i = 0; i < count; i++) {
    positions.push(position.x, position.y, position.z);
    velocities.push(
      (Math.random() - 0.5) * spread * speed,
      Math.random() * speed * 1.5,
      (Math.random() - 0.5) * spread * speed
    );
  }

  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

  const mat = new THREE.PointsMaterial({
    color: color, size: 0.12, transparent: true, opacity: 1,
    sizeAttenuation: true
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  particleSystems.push({
    points, velocities,
    startTime: clock.getElapsedTime(),
    duration: 0.8
  });
}

function updateParticles(time) {
  for (let i = particleSystems.length - 1; i >= 0; i--) {
    const ps = particleSystems[i];
    const elapsed = time - ps.startTime;
    const t = elapsed / ps.duration;

    if (t >= 1) {
      scene.remove(ps.points);
      ps.points.geometry.dispose();
      ps.points.material.dispose();
      particleSystems.splice(i, 1);
      continue;
    }

    // Update positions
    const pos = ps.points.geometry.attributes.position;
    const count = pos.count;
    for (let j = 0; j < count; j++) {
      pos.array[j * 3] += ps.velocities[j * 3] * 0.016;
      pos.array[j * 3 + 1] += ps.velocities[j * 3 + 1] * 0.016 - 0.01; // gravity
      pos.array[j * 3 + 2] += ps.velocities[j * 3 + 2] * 0.016;
    }
    pos.needsUpdate = true;

    // Fade out
    ps.points.material.opacity = 1 - t;
  }
}

// Helper: create a beam (elongated box) from attacker to defender
function createBeam(startPos, endPos, color, thickness=0.06, duration=600) {
  const dir = new THREE.Vector3().subVectors(endPos, startPos);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
  const geo = new THREE.CylinderGeometry(thickness, thickness, len, 8);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
  const beam = new THREE.Mesh(geo, mat);
  beam.position.copy(mid);
  beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  scene.add(beam);
  // Fade out
  const start = performance.now();
  const fade = () => {
    const t = (performance.now()-start)/duration;
    if(t>=1){scene.remove(beam);beam.geometry.dispose();beam.material.dispose();return;}
    beam.material.opacity = 0.9*(1-t);
    requestAnimationFrame(fade);
  };
  requestAnimationFrame(fade);
  return beam;
}

// Helper: screen flash overlay
function screenFlash(color='#ffffff', duration=300) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;inset:0;background:${color};opacity:0.7;pointer-events:none;z-index:999;transition:opacity ${duration}ms ease-out`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity='0'; });
  setTimeout(()=>el.remove(), duration+50);
}

// Helper: spawn a ring shockwave expanding outward on the platform
function spawnShockwave(position, color, duration=600) {
  const geo = new THREE.RingGeometry(0.1, 0.3, 32);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(geo, mat);
  ring.position.copy(position);
  ring.rotation.x = -Math.PI/2;
  scene.add(ring);
  const start = performance.now();
  const grow = () => {
    const t = (performance.now()-start)/duration;
    if(t>=1){scene.remove(ring);ring.geometry.dispose();ring.material.dispose();return;}
    const s = 1 + t*8;
    ring.scale.set(s,s,s);
    ring.material.opacity = 0.8*(1-t);
    requestAnimationFrame(grow);
  };
  requestAnimationFrame(grow);
}

// Helper: lightning bolt (jagged line from above to target)
function spawnLightningBolt(targetPos, color=0xfde047, duration=400) {
  const points = [];
  const startY = 5;
  const segments = 8;
  for(let i=0;i<=segments;i++) {
    const t = i/segments;
    const jitter = (i>0&&i<segments)?0.4:0;
    points.push(new THREE.Vector3(
      targetPos.x + (Math.random()-0.5)*jitter,
      startY - t*(startY-targetPos.y) + (Math.random()-0.5)*jitter,
      targetPos.z + (Math.random()-0.5)*jitter
    ));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, linewidth: 2, transparent: true, opacity: 1 });
  const bolt = new THREE.Line(geo, mat);
  scene.add(bolt);
  const start = performance.now();
  const fade = () => {
    const t = (performance.now()-start)/duration;
    if(t>=1){scene.remove(bolt);bolt.geometry.dispose();bolt.material.dispose();return;}
    bolt.material.opacity = 1-t;
    requestAnimationFrame(fade);
  };
  requestAnimationFrame(fade);
}

// Helper: orbit ring around a fighter
function spawnOrbitRing(targetMesh, color, duration=800) {
  const geo = new THREE.TorusGeometry(1.2, 0.04, 8, 48);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 });
  const ring = new THREE.Mesh(geo, mat);
  ring.position.copy(targetMesh.position);
  scene.add(ring);
  const start = performance.now();
  const spin = () => {
    const t = (performance.now()-start)/duration;
    if(t>=1){scene.remove(ring);ring.geometry.dispose();ring.material.dispose();return;}
    ring.rotation.x += 0.1;
    ring.rotation.z += 0.07;
    ring.material.opacity = 0.8*(1-t*0.8);
    ring.scale.setScalar(1+t*0.5);
    requestAnimationFrame(spin);
  };
  requestAnimationFrame(spin);
}

// Helper: portal swirl (rings that grow then implode)
function spawnPortal(position, color, duration=1000) {
  const rings = [];
  for(let i=0;i<4;i++) {
    const geo = new THREE.TorusGeometry(0.3+i*0.2, 0.04, 8, 32);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9-i*0.15 });
    const ring = new THREE.Mesh(geo, mat);
    ring.position.copy(position);
    ring.rotation.x = Math.PI/2;
    scene.add(rings[i]=ring);
  }
  const start = performance.now();
  const animate = () => {
    const t = (performance.now()-start)/duration;
    if(t>=1){rings.forEach(r=>{scene.remove(r);r.geometry.dispose();r.material.dispose();});return;}
    rings.forEach((r,i)=>{
      r.rotation.z = t*Math.PI*4*(i%2===0?1:-1);
      const pulse = t<0.5?(t*2):(1-(t-0.5)*2);
      r.scale.setScalar(0.5+pulse*1.5);
      r.material.opacity = (0.9-i*0.15)*pulse;
    });
    requestAnimationFrame(animate);
  };
  requestAnimationFrame(animate);
}

// Helper: fire column rising from ground
function spawnFireColumn(position, duration=800) {
  const count = 30;
  for(let i=0;i<count;i++) {
    const offset = new THREE.Vector3((Math.random()-0.5)*0.8, 0, (Math.random()-0.5)*0.8);
    const firePos = position.clone().add(offset);
    const color = Math.random()<0.5 ? 0xef4444 : 0xf97316;
    setTimeout(()=>spawnParticles(firePos, color, 5, 0.3, 2+Math.random()*2), i*20);
  }
}

// Helper: money/envelope rain
function spawnProjectileRain(fromPos, toPos, color, count=8, emoji='') {
  for(let i=0;i<count;i++) {
    setTimeout(()=>{
      const spread = (Math.random()-0.5)*1.5;
      const mid = new THREE.Vector3().lerpVectors(fromPos, toPos, 0.5);
      mid.y += 1+Math.random();
      mid.x += spread;
      createBeam(fromPos, toPos, color, 0.04, 300);
    }, i*60);
  }
}

// ── Weather visual effects in 3D ──

  if (!BAT || !BAT.weather) return;
  if (BAT.weather === 'sunny') {
    if (glowRing) glowRing.material.opacity = 0.5 + Math.sin(time * 3) * 0.2;
  } else if (BAT.weather === 'rain') {
    if (Math.random() < 0.03) {
      const rainPos = new THREE.Vector3((Math.random() - 0.5) * 8, 4, (Math.random() - 0.5) * 6);
      spawnParticles(rainPos, 0x93c5fd, 3, 0.2, 8);
    }
  } else if (BAT.weather === 'hail') {
    if (Math.random() < 0.02) {
      const hailPos = new THREE.Vector3((Math.random() - 0.5) * 8, 4, (Math.random() - 0.5) * 6);
      spawnParticles(hailPos, 0xbfdbfe, 2, 0.3, 6);
    }
  } else if (BAT.weather === 'sandstorm') {
    if (Math.random() < 0.04) {
      const sandPos = new THREE.Vector3(-6, Math.random() * 2, (Math.random() - 0.5) * 6);
      spawnParticles(sandPos, 0xeab308, 4, 0.5, 3);
    }
  }
}

// ── Status visual effects on fighters ──
function updateStatusVisuals(time) {
  if (!BAT) return;
  applyStatusToMesh(playerGroup, BAT.pTeam[BAT.pIdx], time, true);
  applyStatusToMesh(enemyGroup, BAT.aTeam[BAT.aIdx], time, false);
}

function applyStatusToMesh(group, fighter, time, isPlayer) {
  if (!group || !fighter) return;
  const sphere = group.children[0];
  if (!sphere || !sphere.material) return;
  const baseScale = isPlayer ? 1 : 0.82;

  if (fighter.status === 'burn') {
    sphere.material.emissiveIntensity = 0.3 + Math.sin(time * 4) * 0.15;
    sphere.material.emissive.setHex(0xef4444);
  } else if (fighter.status === 'freeze') {
    sphere.material.emissiveIntensity = 0.4;
    sphere.material.emissive.setHex(0x93c5fd);
    group.scale.x = group.scale.z = baseScale * (1 + Math.sin(time * 0.5) * 0.02);
  } else if (fighter.status === 'paralysis') {
    sphere.material.emissiveIntensity = 0.2 + Math.random() * 0.3;
    sphere.material.emissive.setHex(0xeab308);
  } else if (fighter.status === 'poison' || fighter.status === 'toxic') {
    sphere.material.emissiveIntensity = 0.25 + Math.sin(time * 3) * 0.1;
    sphere.material.emissive.setHex(0xa855f7);
  } else if (fighter.status === 'sleep') {
    sphere.material.emissiveIntensity = 0.05;
  } else {
    const tc = getTypeColor(fighter.tps[0]);
    sphere.material.emissive.setHex(tc);
    sphere.material.emissiveIntensity = 0.15;
  }

  if (fighter.fainted) {
    sphere.material.opacity = 0.3;
    sphere.material.transparent = true;
  } else {
    sphere.material.opacity = 1.0;
    sphere.material.transparent = false;
  }
}


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 10: DAMAGE RANGE TOOLTIP ON HOVER
   ═══════════════════════════════════════════════════════════════════════ */

function calcDmgRange(atk, def, m, weather) {
  if (!m.pw || m.pw === 0) return null;
  const eff = typeEff(m.tp, def.tps);
  if (eff === 0) return { eff: 0 };
  const stab = atk.tps.includes(m.tp) ? 1.5 : 1;
  const atkStat = m.c === 'physical' ? effSt(atk, 'atk') : effSt(atk, 'spa');
  const defStat = m.c === 'physical' ? effSt(def, 'def') : effSt(def, 'spd');
  const base = Math.floor((Math.floor(0.4 * m.pw * atkStat / defStat) + 2) * eff * stab);
  const minDmg = Math.floor(base * 0.85);
  const maxDmg = base;
  const minPct = Math.round(minDmg / def.mhp * 100);
  const maxPct = Math.round(maxDmg / def.mhp * 100);
  return { minDmg, maxDmg, minPct, maxPct, eff, isKO: minDmg >= def.hp };
}

function addMoveTooltips() {
  const btns = document.querySelectorAll('.move-btn');
  btns.forEach((btn, i) => {
    btn.addEventListener('mouseenter', (e) => {
      if (!BAT) return;
      const pf = BAT.pTeam[BAT.pIdx], ef = BAT.aTeam[BAT.aIdx];
      const m = pf.mvs[i];
      if (!m || m.cpp <= 0) return;
      const range = calcDmgRange(pf, ef, m, BAT.weather);
      if (!range) return;

      let tooltip = document.getElementById('dmg-tooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'dmg-tooltip';
        tooltip.style.cssText = 'position:fixed;pointer-events:none;z-index:998;background:rgba(12,16,22,.95);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:9px 12px;box-shadow:0 12px 40px rgba(0,0,0,.8);backdrop-filter:blur(10px);min-width:140px;font-family:Inter,sans-serif;';
        document.body.appendChild(tooltip);
      }

      if (range.eff === 0) {
        tooltip.innerHTML = '<div style="font-size:.7rem;font-weight:700;color:#94a3b8">No effect!</div>';
      } else {
        const effTxt = range.eff >= 2 ? 'Super effective!' : range.eff < 1 ? 'Not very effective...' : 'Normal';
        const effCol = range.eff >= 2 ? '#fca5a5' : range.eff < 1 ? '#93c5fd' : '#94a3b8';
        tooltip.innerHTML = `
          <div style="font-family:Orbitron,monospace;font-size:.9rem;font-weight:700;color:#fff">${range.minDmg}–${range.maxDmg}</div>
          <div style="font-size:.62rem;color:#64748b">(${range.minPct}–${range.maxPct}% of foe HP)</div>
          <div style="font-size:.65rem;font-weight:700;color:${effCol};margin-top:2px">${range.eff}x — ${effTxt}</div>
          ${range.isKO ? '<div style="font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:6px;background:rgba(239,68,68,.25);color:#fca5a5;border:1px solid rgba(239,68,68,.3);display:inline-block;margin-top:3px">KO RANGE!</div>' : ''}`;
      }
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 80) + 'px';
    });
    btn.addEventListener('mousemove', (e) => {
      const tooltip = document.getElementById('dmg-tooltip');
      if (tooltip) { tooltip.style.left = (e.clientX + 12) + 'px'; tooltip.style.top = (e.clientY - 80) + 'px'; }
    });
    btn.addEventListener('mouseleave', () => {
      const tooltip = document.getElementById('dmg-tooltip');
      if (tooltip) tooltip.style.display = 'none';
    });
  });
}

// Patch renderMoves to add tooltips after rendering
const _origRenderMoves = renderMoves;
renderMoves = function(f) {
  _origRenderMoves(f);
  requestAnimationFrame(addMoveTooltips);
};


/* ═══════════════════════════════════════════════════════════════════════
   SECTION 11: ENHANCED ANIMATION LOOP
   ═══════════════════════════════════════════════════════════════════════ */

// Override animate with enhanced version that includes weather & status
const _origAnimateRef = animate;
animate = function animateEnhanced() {
  requestAnimationFrame(animateEnhanced);
  const time = clock.getElapsedTime();

  // ── Camera ──
  if (cameraState.phase === 'intro') {
    const elapsed = time - cameraState.startTime;
    const t = Math.min(elapsed / 2.0, 1.0);
    camera.position.z = 3 + t * 5;
    camera.position.y = 2 + t * 0.5;
    if (t >= 1.0) cameraState.phase = 'idle';
  } else if (cameraState.phase === 'idle') {
    camera.position.y = 2.5 + Math.sin(time * 0.8) * 0.05;
    camera.position.x += (0 - camera.position.x) * 0.03;
    camera.position.z += (8 - camera.position.z) * 0.03;
  } else if (cameraState.phase === 'playerAttack') {
    camera.position.x += (-1 - camera.position.x) * 0.08;
    if (Math.abs(camera.position.x + 1) < 0.05) cameraState.phase = 'idle';
  } else if (cameraState.phase === 'enemyAttack') {
    camera.position.x += (1 - camera.position.x) * 0.08;
    if (Math.abs(camera.position.x - 1) < 0.05) cameraState.phase = 'idle';
  } else if (cameraState.phase === 'ko') {
    camera.position.z += (6 - camera.position.z) * 0.05;
    if (time - cameraState.startTime > 1.5) cameraState.phase = 'idle';
  }

  // Camera shake
  if (cameraState.shaking && time < cameraState.shakeEnd) {
    camera.position.x += (Math.random() - 0.5) * 0.3;
    camera.position.y += (Math.random() - 0.5) * 0.15;
  }

  camera.lookAt(0, 0.5, 0);

  // ── Fighter idle bob ──
  if (playerGroup && BAT && BAT.pTeam[BAT.pIdx] && !BAT.pTeam[BAT.pIdx].fainted) {
    const sleepMod = BAT.pTeam[BAT.pIdx].status === 'sleep' ? 0.3 : 1;
    playerGroup.position.y = playerBaseY + Math.sin(time * 2 * sleepMod) * 0.08;
  }
  if (enemyGroup && BAT && BAT.aTeam[BAT.aIdx] && !BAT.aTeam[BAT.aIdx].fainted) {
    const sleepMod = BAT.aTeam[BAT.aIdx].status === 'sleep' ? 0.3 : 1;
    enemyGroup.position.y = enemyBaseY + Math.sin(time * 2 * sleepMod + 1.5) * 0.08;
  }

  // Face billboarding
  if (playerFace) playerFace.quaternion.copy(camera.quaternion);
  if (enemyFace) enemyFace.quaternion.copy(camera.quaternion);

  // Star twinkling
  if (starPoints) {
    const opArr = starPoints.geometry.attributes.opacity;
    if (opArr) {
      for (let i = 0; i < opArr.count; i++) {
        opArr.array[i] = 0.3 + Math.sin(time * 1.5 + i * 0.7) * 0.5;
      }
      opArr.needsUpdate = true;
    }
    starPoints.material.opacity = 0.7 + Math.sin(time * 0.3) * 0.15;
  }

  // Glow ring pulse
  if (glowRing) { glowRing.material.opacity = 0.4 + Math.sin(time * 2) * 0.15; }

  // Weather visuals (rain/snow/sand particles)
  updateWeatherVisuals(time);

  // Status visuals (burn glow, freeze tint, etc.)
  updateStatusVisuals(time);

  // Particle systems update
  updateParticles(time);

  renderer.render(scene, camera);
};
