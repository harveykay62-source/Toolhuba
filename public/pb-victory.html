<!DOCTYPE html>
<!-- PolitiBattle — Victory / Defeat Screen -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="PolitiBattle — Victory / Defeat results screen">
  <title>PolitiBattle — Results</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>⚔️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#09090f;color:#e2e8f0;font-family:'Inter',sans-serif}
:root{--nav-h:60px;--red:#ef4444;--gold:#f59e0b;--blue:#3b82f6;--green:#22c55e;
  --card:rgba(12,12,28,0.88);--border:rgba(255,255,255,0.08)}
/* ═══ NAV ═══ */
.site-header{position:relative;z-index:90;height:var(--nav-h);background:rgba(9,9,15,0.95);
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;flex-shrink:0}
.header-inner{display:flex;align-items:center;width:100%;max-width:1400px;margin:0 auto;gap:12px}
.logo{display:flex;align-items:center;gap:6px;text-decoration:none;color:#e2e8f0;font-weight:700;font-size:1rem}
.logo-icon{font-size:1.15rem}.logo-ai{color:var(--blue)}
.header-nav{display:flex;gap:4px;margin-left:auto}
.header-nav-btn{padding:5px 10px;border-radius:6px;text-decoration:none;color:#94a3b8;font-size:.78rem;
  transition:background .2s,color .2s;white-space:nowrap}
.header-nav-btn:hover{background:rgba(255,255,255,.07);color:#f1f5f9}
.header-nav-btn.active-nav{background:rgba(99,102,241,.15);color:#818cf8}
@media(max-width:640px){.header-nav .header-nav-btn:not(.active-nav){display:none}}
/* ═══ MAIN AREA ═══ */
#pb-victory-app{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - var(--nav-h));overflow:hidden;position:relative;padding:12px 16px;gap:10px}
/* Ambient background */
#pb-victory-app::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  transition:opacity .8s}
#pb-victory-app.won::before{background:radial-gradient(ellipse at 50% 30%,rgba(245,158,11,.1) 0%,transparent 60%)}
#pb-victory-app.lost::before{background:radial-gradient(ellipse at 50% 30%,rgba(239,68,68,.08) 0%,transparent 60%)}
/* Particle canvas */
#pb-particles{position:absolute;inset:0;pointer-events:none;z-index:0}
/* ═══ HERO ICON ═══ */
.hero-icon{font-size:clamp(48px,10vw,80px);animation:iconEntrance .6s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity:0;transform:scale(0);z-index:1;filter:drop-shadow(0 0 24px rgba(245,158,11,.3))}
@keyframes iconEntrance{0%{opacity:0;transform:scale(0)}70%{opacity:1;transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
.won .hero-icon{animation-name:iconEntranceWin}
@keyframes iconEntranceWin{0%{opacity:0;transform:scale(0) rotate(-15deg)}
  70%{opacity:1;transform:scale(1.25) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.hero-icon.bounce{animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
/* ═══ TITLE ═══ */
.result-title{font-family:'Russo One',sans-serif;font-size:clamp(32px,8vw,56px);text-transform:uppercase;
  letter-spacing:2px;animation:titleSlide .5s .2s ease-out both;z-index:1;line-height:1.1}
@keyframes titleSlide{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.won .result-title{background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;filter:drop-shadow(0 0 20px rgba(245,158,11,.35))}
.lost .result-title{background:linear-gradient(135deg,#f87171,#ef4444,#dc2626,#f87171);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(239,68,68,.3))}
/* ═══ FLAVOUR TEXT ═══ */
.flavour-text{font-size:clamp(13px,2.5vw,16px);color:#94a3b8;font-style:italic;text-align:center;
  animation:titleSlide .5s .35s ease-out both;z-index:1;max-width:420px}
/* ═══ STATS ROW ═══ */
.stats-row{display:flex;gap:clamp(12px,3vw,28px);justify-content:center;flex-wrap:wrap;
  animation:titleSlide .4s .5s ease-out both;z-index:1}
.stat-cell{text-align:center}
.stat-val{font-family:'Russo One',sans-serif;font-size:clamp(20px,4vw,28px);color:#f1f5f9}
.stat-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-sep{width:1px;background:var(--border);align-self:stretch;margin:4px 0}
/* ═══ ELO CHANGE ═══ */
.elo-change{font-family:'Russo One',sans-serif;font-size:clamp(16px,3vw,22px);
  animation:titleSlide .4s .65s ease-out both;z-index:1;display:flex;align-items:center;gap:8px}
.elo-change.positive{color:var(--green)}.elo-change.negative{color:var(--red)}
.rank-badge{font-size:12px;padding:3px 10px;border-radius:999px;background:rgba(99,102,241,.15);
  color:#a5b4fc;font-family:'Inter',sans-serif;font-weight:600}
/* ═══ ACHIEVEMENTS ═══ */
.achievements-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:1;max-width:600px}
.achieve-card{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;
  background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);
  transform:translateX(60px);opacity:0;animation:achieveSlide .4s ease-out forwards}
@keyframes achieveSlide{to{transform:translateX(0);opacity:1}}
.achieve-icon{font-size:20px}.achieve-info{text-align:left}
.achieve-name{font-size:13px;font-weight:600;color:#e2e8f0}
.achieve-desc{font-size:11px;color:#94a3b8}
/* ═══ ACTION BUTTONS ═══ */
.action-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:1;
  animation:titleSlide .4s .8s ease-out both}
.action-btn{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--card);
  color:#e2e8f0;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:'Inter',sans-serif}
.action-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.action-btn.primary{background:linear-gradient(135deg,rgba(99,102,241,.25),rgba(99,102,241,.15));
  border-color:rgba(99,102,241,.3)}
.action-btn.primary:hover{background:linear-gradient(135deg,rgba(99,102,241,.35),rgba(99,102,241,.25))}
/* ═══ REPLAY MODAL ═══ */
.replay-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.replay-overlay.open{display:flex}
.replay-modal{background:#0f0f1e;border:1px solid rgba(255,255,255,.1);border-radius:14px;
  width:min(560px,92vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.replay-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  border-bottom:1px solid var(--border)}
.replay-header h3{font-family:'Russo One',sans-serif;font-size:16px;color:#e2e8f0}
.replay-close{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:4px}
.replay-close:hover{color:#f1f5f9}
.replay-log{flex:1;overflow-y:auto;padding:14px 18px;font-size:13px;line-height:1.7}
.replay-log .rlog-turn{color:var(--gold);font-weight:700;margin-top:10px;font-family:'Russo One',sans-serif;font-size:12px}
.replay-log .rlog-entry{color:#cbd5e1;padding:2px 0}
.replay-log .rlog-hp{color:#64748b;font-size:11px}
.replay-log .rlog-ko{color:var(--red);font-weight:600}
.replay-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.replay-footer button{padding:7px 16px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:#e2e8f0;font-size:13px;cursor:pointer;font-weight:500}
.replay-footer button:hover{background:rgba(255,255,255,.08)}
/* Scrollbar */
.replay-log::-webkit-scrollbar{width:5px}.replay-log::-webkit-scrollbar-track{background:transparent}
.replay-log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
@media(max-width:480px){
  .stats-row{gap:10px}.stat-val{font-size:18px}.action-btn{padding:8px 12px;font-size:13px}
  .stat-sep{display:none}
}
</style>
</head>
<body>
<!-- ═══════════════════════ NAV ═══════════════════════ -->
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a class="logo" href="/" aria-label="ToolHub AI Home">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">ToolHub<span class="logo-ai"> AI</span></span>
    </a>
    <nav class="header-nav">
      <a class="header-nav-btn" href="/">🔧 Tools</a>
      <a class="header-nav-btn" href="/quizzes">🎓 Quizzes</a>
      <a class="header-nav-btn" href="/multiplayer">🎮 Multi</a>
      <a class="header-nav-btn active-nav" href="/politibattle">🏛️ PolitiBattle</a>
    </nav>
  </div>
</header>
<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<div id="pb-victory-app">
  <canvas id="pb-particles"></canvas>
  <div class="hero-icon" id="heroIcon"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="flavour-text" id="flavourText"></div>
  <div class="stats-row" id="statsRow"></div>
  <div class="elo-change" id="eloChange"></div>
  <div class="achievements-row" id="achieveRow"></div>
  <div class="action-row" id="actionRow"></div>
</div>
<!-- ═══════════════════════ REPLAY MODAL ═══════════════════════ -->
<div class="replay-overlay" id="replayOverlay">
  <div class="replay-modal">
    <div class="replay-header">
      <h3>📽 Battle Replay</h3>
      <button class="replay-close" id="replayClose" aria-label="Close">&times;</button>
    </div>
    <div class="replay-log" id="replayLog"></div>
    <div class="replay-footer">
      <button id="replayStepBtn">Next Turn →</button>
      <button id="replayShowAll">Show All</button>
    </div>
  </div>
</div>
<!-- ═══════════════════════ SCRIPTS ═══════════════════════ -->
<script src="/js/pb-data.js"></script>
<script src="/js/pb-avatars.js"></script>
<script src="/js/pb-engine.js"></script>
<script src="/js/pb-mechanics.js"></script>
<script src="/js/pb-ai.js"></script>
<script src="/js/pb-sound.js"></script>
<script src="/js/pb-ui.js"></script>
<script src="/js/politibattle-main.js"></script>
<script>
(function() {
  'use strict';
  /* ─── FLAVOUR TEXT ARRAYS ─── */
  var WIN_LINES = [
    "The opposition has been cancelled.",
    "Democracy has spoken. It said 'you win'.",
    "Another political career destroyed.",
    "You swept the electoral college.",
    "Flawless campaign. Zero scandals. Total domination.",
    "Your approval rating just hit 100%.",
    "The exit polls were right for once.",
    "Landslide victory. Recount-proof.",
    "The filibuster couldn't save them.",
    "You didn't just win — you redistricted their soul."
  ];
  var LOSE_LINES = [
    "You've been primaried.",
    "Resign with dignity.",
    "Your campaign manager just quit.",
    "The voters have spoken. Pack your desk.",
    "Term-limited by force.",
    "Even your own party won't return your calls.",
    "Concession speech time.",
    "Your political career is now a Wikipedia footnote.",
    "Impeached by popular opinion.",
    "You lost the debate and the election."
  ];
  /* ─── RANK TABLE ─── */
  var RANKS = [
    { min:0,    name:'Intern',        icon:'📋' },
    { min:1000, name:'Staffer',       icon:'🗂️' },
    { min:1100, name:'Lobbyist',      icon:'💼' },
    { min:1200, name:'Senator',       icon:'🏛️' },
    { min:1350, name:'Governor',      icon:'⭐' },
    { min:1500, name:'Vice President',icon:'🦅' },
    { min:1700, name:'President',     icon:'🇺🇸' },
    { min:2000, name:'Shadow Govt',   icon:'👁️' }
  ];
  function getRank(elo) {
    for (var i = RANKS.length - 1; i >= 0; i--) {
      if (elo >= RANKS[i].min) return RANKS[i];
    }
    return RANKS[0];
  }
  /* ─── READ VICTORY DATA ─── */
  var raw;
  try { raw = JSON.parse(sessionStorage.getItem('pb_victoryData')); } catch(e) {}
  if (!raw) { window.location.href = '/politibattle'; return; }
  var won = !!raw.won;
  /* ─── INIT SOUND ─── */
  var S = window.PBSound;
  if (S && S.init) {
    S.init();
    setTimeout(function() {
      try { won ? S.playVictory() : S.playDefeat(); } catch(e) {}
    }, 400);
  }
  /* ─── RECORD STATS (localStorage) ─── */
  var statsKey = 'politibattle_stats';
  var stats;
  try { stats = JSON.parse(localStorage.getItem(statsKey)) || {}; } catch(e) { stats = {}; }
  stats.wins   = (stats.wins || 0)   + (won ? 1 : 0);
  stats.losses = (stats.losses || 0) + (won ? 0 : 1);
  stats.elo    = (stats.elo || 1000) + (raw.eloChange || 0);
  if (stats.elo < 0) stats.elo = 0;
  stats.games  = (stats.games || 0) + 1;
  try { localStorage.setItem(statsKey, JSON.stringify(stats)); } catch(e) {}
  /* ─── ALSO USE PBStats IF AVAILABLE ─── */
  if (window.PBStats && typeof PBStats.recordResult === 'function') {
    try { PBStats.recordResult(won, raw.eloChange); } catch(e) {}
  }
  /* ─── RENDER ─── */
  var app = document.getElementById('pb-victory-app');
  app.classList.add(won ? 'won' : 'lost');
  // Hero icon
  var heroIcon = document.getElementById('heroIcon');
  heroIcon.textContent = won ? '🏆' : '💀';
  setTimeout(function() { heroIcon.classList.add('bounce'); }, 700);
  // Title
  document.getElementById('resultTitle').textContent = won ? 'VICTORY!' : 'DEFEATED!';
  // Flavour
  var lines = won ? WIN_LINES : LOSE_LINES;
  document.getElementById('flavourText').textContent = lines[Math.floor(Math.random() * lines.length)];
  // Stats row — animate count-up
  var statsDef = [
    { label:'Damage Dealt', val: raw.pDmgDealt || 0 },
    { label:'Critical Hits', val: raw.pCrits || 0 },
    { label:'KOs',          val: raw.pKOs || 0 },
    { label:'Turns',        val: raw.turns || 0 }
  ];
  var statsRow = document.getElementById('statsRow');
  statsDef.forEach(function(s, i) {
    if (i > 0) { var sep = document.createElement('div'); sep.className = 'stat-sep'; statsRow.appendChild(sep); }
    var cell = document.createElement('div'); cell.className = 'stat-cell';
    var valEl = document.createElement('div'); valEl.className = 'stat-val'; valEl.textContent = '0';
    valEl.dataset.target = s.val;
    var lbl = document.createElement('div'); lbl.className = 'stat-label'; lbl.textContent = s.label;
    cell.appendChild(valEl); cell.appendChild(lbl); statsRow.appendChild(cell);
  });
  // Count-up animation
  setTimeout(function() {
    document.querySelectorAll('.stat-val[data-target]').forEach(function(el) {
      var target = parseInt(el.dataset.target, 10);
      if (target === 0) return;
      var start = performance.now();
      var dur = 1000;
      function tick(now) {
        var p = Math.min((now - start) / dur, 1);
        var ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(target * ease);
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  }, 600);
  // ELO change
  var eloEl = document.getElementById('eloChange');
  var change = raw.eloChange || 0;
  if (change !== 0) {
    eloEl.classList.add(change > 0 ? 'positive' : 'negative');
    eloEl.innerHTML = (change > 0 ? '+' + change + ' ELO ▲' : change + ' ELO ▼');
    var oldElo = stats.elo - change;
    var oldRank = getRank(oldElo);
    var newRank = getRank(stats.elo);
    if (newRank.min !== oldRank.min) {
      var badge = document.createElement('span'); badge.className = 'rank-badge';
      badge.textContent = newRank.icon + ' ' + newRank.name;
      eloEl.appendChild(badge);
    }
  }
  // Achievements
  var achieveRow = document.getElementById('achieveRow');
  var achievements = raw.newAchievements || [];
  achievements.forEach(function(a, i) {
    var card = document.createElement('div'); card.className = 'achieve-card';
    card.style.animationDelay = (0.9 + i * 0.2) + 's';
    card.innerHTML = '<span class="achieve-icon">' + (a.icon || '🏅') + '</span>'
      + '<div class="achieve-info"><div class="achieve-name">' + (a.name || 'Achievement') + '</div>'
      + '<div class="achieve-desc">' + (a.description || '') + '</div></div>';
    achieveRow.appendChild(card);
  });
  // Action buttons
  var actionRow = document.getElementById('actionRow');
  var buttons = [
    { text:'⚔️ Battle Again', cls:'primary', fn: function() {
      window.location.href = '/politibattle/preview';
    }},
    { text:'🎲 New Random', cls:'', fn: function() {
      if (window.PolitiBattle && PolitiBattle._randomizeTeam) { PolitiBattle._randomizeTeam(); }
      else { window.location.href = '/politibattle/team'; }
    }},
    { text:'📽 Watch Replay', cls:'', fn: function() { openReplay(); }},
    { text:'🏠 Home', cls:'', fn: function() { window.location.href = '/politibattle'; }}
  ];
  buttons.forEach(function(b) {
    var btn = document.createElement('button'); btn.className = 'action-btn' + (b.cls ? ' ' + b.cls : '');
    btn.textContent = b.text; btn.addEventListener('click', b.fn);
    actionRow.appendChild(btn);
  });
  /* ─── PARTICLES ─── */
  (function initParticles() {
    var canvas = document.getElementById('pb-particles');
    var ctx = canvas.getContext('2d');
    var W, H, particles = [];
    function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
    resize(); window.addEventListener('resize', resize);
    var count = won ? 50 : 20;
    for (var i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 2.5 + 0.5,
        dx: (Math.random() - 0.5) * 0.4,
        dy: won ? -(Math.random() * 0.6 + 0.2) : (Math.random() * 0.3 + 0.1),
        a: Math.random() * 0.5 + 0.2,
        color: won ? 'rgba(245,158,11,' : 'rgba(239,68,68,'
      });
    }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(function(p) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + p.a + ')'; ctx.fill();
        p.x += p.dx; p.y += p.dy;
        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
        if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
  /* ─── REPLAY MODAL ─── */
  var replayOverlay = document.getElementById('replayOverlay');
  var replayLog     = document.getElementById('replayLog');
  var replayStepBtn = document.getElementById('replayStepBtn');
  var replayShowAll = document.getElementById('replayShowAll');
  var replayClose   = document.getElementById('replayClose');
  var replayTurns   = [];
  var replayIdx     = 0;
  // Build replay turns from battle log stored in victoryData
  // The log is an array of { msg, type, turn? }
  function buildReplayTurns() {
    var log = [];
    // Try to recover battle log from sessionStorage
    try {
      var bcfg = JSON.parse(sessionStorage.getItem('pb_battleConfig'));
      if (bcfg && bcfg.log) log = bcfg.log;
    } catch(e) {}
    if (raw.log) log = raw.log;
    // Fallback: build a summary from team data
    if (!log || log.length === 0) {
      log = [];
      log.push({ msg: 'Battle began!', type: 'info', turn: 1 });
      (raw.playerTeam || []).forEach(function(f) {
        if (f.fainted) log.push({ msg: f.n + ' was KO\'d (had ' + f.mhp + ' max HP)', type: 'ko' });
        else log.push({ msg: f.n + ' survived with ' + f.hp + '/' + f.mhp + ' HP', type: 'info' });
      });
      (raw.aiTeam || []).forEach(function(f) {
        if (f.fainted) log.push({ msg: f.n + ' was KO\'d (had ' + f.mhp + ' max HP)', type: 'ko' });
        else log.push({ msg: f.n + ' survived with ' + f.hp + '/' + f.mhp + ' HP', type: 'info' });
      });
      log.push({ msg: won ? 'Player wins!' : 'AI wins!', type: 'info' });
    }
    // Group by turn
    var grouped = []; var cur = [];
    log.forEach(function(e) {
      if (e.turn && cur.length > 0 && e.turn !== cur[0].turn) {
        grouped.push(cur); cur = [];
      }
      cur.push(e);
    });
    if (cur.length) grouped.push(cur);
    return grouped.length ? grouped : [log];
  }
  function openReplay() {
    replayTurns = buildReplayTurns();
    replayIdx = 0;
    replayLog.innerHTML = '';
    replayOverlay.classList.add('open');
    showReplayStep();
  }
  function showReplayStep() {
    if (replayIdx >= replayTurns.length) {
      replayStepBtn.textContent = 'Done';
      replayStepBtn.disabled = true;
      return;
    }
    var group = replayTurns[replayIdx];
    var turnNum = group[0] && group[0].turn ? group[0].turn : replayIdx + 1;
    var turnDiv = document.createElement('div');
    turnDiv.innerHTML = '<div class="rlog-turn">— Turn ' + turnNum + ' —</div>';
    group.forEach(function(e) {
      var cls = e.type === 'ko' ? 'rlog-ko' : 'rlog-entry';
      var d = document.createElement('div'); d.className = cls; d.textContent = e.msg;
      turnDiv.appendChild(d);
    });
    replayLog.appendChild(turnDiv);
    replayLog.scrollTop = replayLog.scrollHeight;
    replayIdx++;
    replayStepBtn.textContent = replayIdx >= replayTurns.length ? 'Done' : 'Next Turn →';
  }
  replayStepBtn.addEventListener('click', showReplayStep);
  replayShowAll.addEventListener('click', function() {
    while (replayIdx < replayTurns.length) showReplayStep();
  });
  replayClose.addEventListener('click', function() { replayOverlay.classList.remove('open'); });
  replayOverlay.addEventListener('click', function(e) {
    if (e.target === replayOverlay) replayOverlay.classList.remove('open');
  });
})();
</script>
</body>
</html>
