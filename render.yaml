services:
  - type: web
    name: toolhub-ai
    env: node
    buildCommand: npm install
    startCommand: node server.js
    plan: starter          # upgrade to starter for persistent disk support
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: toolhub-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /data

    # ── Persistent Disk (survives restarts/redeploys) ──────────────────────
    disk:
      name: toolhub-data
      mountPath: /data
      sizeGB: 1             # 1 GB = ~500k compressed quizzes @ 2KB each

databases:
  - name: toolhub-db
    plan: free
    databaseName: toolhub
    user: toolhub
